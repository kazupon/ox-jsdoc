name: Release

on:
  # Normal release flow: `vpr release` (= `pnpm run release`) bumps versions,
  # commits with a `release: vX.Y.Z` message, and pushes a `vX.Y.Z` tag. The
  # tag push trigger here runs the full pipeline: npm publish + cargo publish
  # via crates.io trusted publishing.
  push:
    branches-ignore:
      - '**'
    tags:
      - 'v*'
  # Manual retry path. Use this when a tag-push run failed transiently and
  # one side (npm trusted publishing or crates.io trusted publishing) needs
  # to be re-run against the current versions on disk. Toggle the inputs to
  # pick which publish jobs run; the unchecked side is skipped entirely so
  # an "already published this version" error doesn't fail the workflow.
  workflow_dispatch:
    inputs:
      publish_npm:
        description: 'Re-run npm publish job (will fail if the version is already on the registry)'
        type: boolean
        default: false
      publish_crate:
        description: 'Re-run crates.io publish job'
        type: boolean
        default: true

env:
  CI: true

permissions:
  contents: read

jobs:
  test-decoder:
    name: Test @ox-jsdoc/decoder
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codes
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@8ecb39174989ce55af90f45cf55b02738599831d # v1.6.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Test decoder
        run: pnpm --filter @ox-jsdoc/decoder test

  build-napi:
    name: Build ${{ matrix.package_name }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Only the canonical NAPI package needs native builds. The
        # `ox-jsdoc-binary` alias is a JS-only thin re-export of `ox-jsdoc`
        # and does not bundle a separate native binding. The `ox-jsdoc-origin`
        # package is `"private": true` and is not published.
        include:
          - package_name: ox-jsdoc
            package_path: napi/ox-jsdoc
            os: macos-latest
            target: aarch64-apple-darwin
            build: pnpm build --target aarch64-apple-darwin

          - package_name: ox-jsdoc
            package_path: napi/ox-jsdoc
            os: macos-latest
            target: x86_64-apple-darwin
            build: pnpm build --target x86_64-apple-darwin

          - package_name: ox-jsdoc
            package_path: napi/ox-jsdoc
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: pnpm build --target x86_64-unknown-linux-gnu --use-napi-cross

          - package_name: ox-jsdoc
            package_path: napi/ox-jsdoc
            os: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm build --target x86_64-pc-windows-msvc

    defaults:
      run:
        shell: bash

    steps:
      - name: Enable long paths
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout codes
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@8ecb39174989ce55af90f45cf55b02738599831d # v1.6.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Add Rust target
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "$TARGET"

      - name: Build native binding
        working-directory: ${{ matrix.package_path }}
        env:
          BUILD_CMD: ${{ matrix.build }}
        run: $BUILD_CMD

      - name: Upload native binding
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: ${{ matrix.package_name }}-${{ matrix.target }}
          path: |
            ${{ matrix.package_path }}/**/*.node
            ${{ matrix.package_path }}/**/bindings.js
            ${{ matrix.package_path }}/**/bindings.d.ts

  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    # Tag-push runs always go through this job. `workflow_dispatch` runs only
    # touch npm if the operator explicitly opts in via `publish_npm: true` —
    # otherwise the job is skipped because re-publishing the same version is
    # rejected by the npm registry.
    if: |
      startsWith(github.ref, 'refs/tags/v')
      || github.event.inputs.publish_npm == 'true'
    needs:
      - test-decoder
      - build-napi
    permissions:
      contents: write
      id-token: write
    steps:
      # `git-auto-commit-action` (Commit changelog step) pushes to `main`
      # using the credentials persisted here. Disabling persist-credentials
      # would break that step.
      - name: Checkout codes # zizmor: ignore[artipacked]
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@8ecb39174989ce55af90f45cf55b02738599831d # v1.6.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Build wasm packages
        # Only the canonical WASM package has a wasm-pack build. The
        # `@ox-jsdoc/wasm-binary` alias is a JS-only thin re-export, and
        # `@ox-jsdoc/wasm-origin` is `"private": true`.
        run: vpr -F '@ox-jsdoc/wasm' build --release

      - name: Build decoder
        run: vpr -F '@ox-jsdoc/decoder' build

      - name: Download native bindings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Publish wasm packages
        run: ./scripts/release.sh

      - name: Publish decoder
        working-directory: packages/decoder
        run: |
          publish_flags=(--access public --no-git-checks)
          pnpm publish "${publish_flags[@]}"

      - name: Publish ox-jsdoc
        run: |
          package_path=napi/ox-jsdoc
          npm_dir=release-dir/ox-jsdoc
          mkdir -p "${npm_dir}"
          pnpm -C "${package_path}" exec napi create-npm-dirs --package-json-path ../../${package_path}/package.json --npm-dir ../../${npm_dir}
          pnpm -C "${package_path}" exec napi artifacts --package-json-path ../../${package_path}/package.json --output-dir ../../artifacts --npm-dir ../../${npm_dir}
          pnpm -C "${package_path}" exec napi pre-publish --no-gh-release -t npm --package-json-path ../../${package_path}/package.json --npm-dir ../../${npm_dir}
          cp artifacts/ox-jsdoc-x86_64-unknown-linux-gnu/src-js/bindings.js "${package_path}/src-js/bindings.js"
          cp artifacts/ox-jsdoc-x86_64-unknown-linux-gnu/src-js/bindings.d.ts "${package_path}/src-js/bindings.d.ts"
          cd "${package_path}"
          node -e 'const fs = require("node:fs"); const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); const required = ["src-js/bindings.js", "src-js/bindings.d.ts", "src-js/index.js", "src-js/index.d.ts"]; pkg.files = [...new Set([...(pkg.files || []), ...required])]; fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");'
          npm pack --dry-run --json | node -e 'const fs = require("node:fs"); const [{ files }] = JSON.parse(fs.readFileSync(0, "utf8")); const paths = new Set(files.map(file => file.path)); for (const file of ["src-js/bindings.js", "src-js/bindings.d.ts", "src-js/index.js", "src-js/index.d.ts"]) { if (!paths.has(file)) throw new Error(file + " is missing from npm pack"); }'
          publish_flags=(--access public --no-git-checks)
          pnpm publish "${publish_flags[@]}"

      - name: Publish ox-jsdoc-binary alias
        # Post-cutover, `ox-jsdoc-binary` is a JS-only thin re-export of the
        # canonical `ox-jsdoc` package. No native binding bundling, no
        # `napi pre-publish`, no platform sub-package fan-out.
        working-directory: napi/ox-jsdoc-binary
        run: |
          publish_flags=(--access public --no-git-checks)
          pnpm publish "${publish_flags[@]}"

      - name: Smoke test published packages
        run: |
          version=$(node -p "require('./napi/ox-jsdoc/package.json').version")
          for package_name in @ox-jsdoc/decoder ox-jsdoc ox-jsdoc-binary; do
            for attempt in {1..12}; do
              if npm view "${package_name}@${version}" version >/dev/null 2>&1; then
                echo "${package_name}@${version} is available on npm"
                break
              fi
              if [[ "${attempt}" == "12" ]]; then
                echo "${package_name}@${version} is not available on npm after waiting" >&2
                exit 1
              fi
              echo "Waiting for ${package_name}@${version} to become available on npm (${attempt}/12)"
              sleep 10
            done
          done
          tmpdir=$(mktemp -d)
          cd "${tmpdir}"
          npm init -y
          npm install --ignore-scripts "@ox-jsdoc/decoder@${version}" "ox-jsdoc@${version}" "ox-jsdoc-binary@${version}"
          node --input-type=module -e "import('@ox-jsdoc/decoder').then(() => console.log('@ox-jsdoc/decoder smoke ok'))"
          node --input-type=module -e "import { parse } from 'ox-jsdoc'; const result = parse('/** hi */'); if (result.diagnostics.length !== 0) throw new Error('ox-jsdoc diagnostics mismatch'); console.log('ox-jsdoc smoke ok')"
          node --input-type=module -e "import { parse } from 'ox-jsdoc-binary'; const result = parse('/** hi */'); if (result.diagnostics.length !== 0) throw new Error('ox-jsdoc-binary diagnostics mismatch'); console.log('ox-jsdoc-binary smoke ok')"

      - name: Extract version tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: jungwinter/split@7f51d99e7cc1f147f6f99be75acf5e641930af88 # v2.1.0
        id: split
        with:
          msg: ${{ github.ref }}
          separator: /

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.split.outputs._2 }}
        run: gh release create "$TAG" --generate-notes

      - name: Sync changelog from GitHub releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.split.outputs._2 }}
        run: vp exec gh-changelogen --repo=kazupon/ox-jsdoc --tag="$TAG"

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          branch: main
          file_pattern: CHANGELOG.md
          commit_message: 'chore: generate changelog'

  publish-crate:
    name: Publish ox_jsdoc to crates.io
    runs-on: ubuntu-latest
    needs:
      - test-decoder
      - build-napi
      - publish
    # Tag-push runs always reach this job after `publish` succeeds.
    # `workflow_dispatch` runs only run this job when `publish_crate: true`
    # is selected (default). `always()` lets us evaluate the condition even
    # when `needs.publish` is `skipped`.
    if: |
      always()
      && needs.test-decoder.result == 'success'
      && needs.build-napi.result == 'success'
      && (needs.publish.result == 'success' || needs.publish.result == 'skipped')
      && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_crate == 'true')
    permissions:
      # Required for crates.io trusted publishing (OIDC).
      id-token: write
    steps:
      - name: Checkout codes
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        # rust-toolchain.toml at the repo root pins the channel; `rustup show`
        # honors it and installs the matching toolchain.
        run: rustup show

      - name: Verify Cargo.toml version matches the v* tag
        # Only enforced on tag-driven releases; manual workflow_dispatch runs
        # (retry) skip this guard.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          cargo_version=$(grep '^version = ' crates/ox_jsdoc/Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "tag version $tag_version does not match crates/ox_jsdoc/Cargo.toml version $cargo_version" >&2
            exit 1
          fi

      - name: cargo publish dry-run
        # `--dry-run` only hits the crates.io index for sanity, no auth needed.
        run: cargo publish --dry-run -p ox_jsdoc

      - name: Authenticate crates.io via Trusted Publishing
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: cargo publish
        env:
          # Short-lived token produced by the trusted-publishing step. cargo
          # always reads the token from `CARGO_REGISTRY_TOKEN`, but the value
          # here is the OIDC-derived ephemeral token — not a long-lived
          # repository secret. The token is auto-revoked when the job ends.
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p ox_jsdoc
