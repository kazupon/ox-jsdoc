name: Release

on:
  # Normal release flow: `vpr release` (= `pnpm run release`) bumps versions,
  # commits with a `release: vX.Y.Z` message, and pushes a `vX.Y.Z` tag. The
  # tag push trigger here runs the full pipeline: npm publish + cargo publish
  # via crates.io trusted publishing + GitHub Release + changelog sync.
  push:
    branches-ignore:
      - '**'
    tags:
      - 'v*'
  # Manual retry path. Use this when a tag-push run partially failed and a
  # specific job needs to be re-run against the same tag. Pick the failed
  # job in `job` (or `all` for a full re-run) and supply the existing tag
  # via `tag`. Each job knows how to skip cleanly when not selected, so an
  # "already published this version" error from the unselected side does
  # not fail the workflow.
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job(s) to run. `all` runs the full pipeline. Pick a specific job to retry only that one.'
        type: choice
        required: true
        default: all
        options:
          - all
          - npm-publish
          - crate-publish
          - release-notes
      tag:
        description: 'Existing tag to release (e.g. v0.0.16). Required.'
        type: string
        required: true

env:
  CI: true
  # On tag-push, `github.ref_name` is the tag string (e.g. "v0.0.15"). On
  # workflow_dispatch, the operator supplies the tag explicitly via
  # `inputs.tag`. All downstream jobs reference `$TAG` instead of parsing
  # `github.ref` themselves.
  TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions:
  contents: read

jobs:
  test-decoder:
    name: Test @ox-jsdoc/decoder
    # Regression gate for `npm-publish`. Skipped on workflow_dispatch retries
    # that don't include `npm-publish` (the operator has already confirmed the
    # tag's code is good when retrying `crate-publish` or `release-notes`).
    if: >-
      github.event_name == 'push' || (github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'npm-publish'))


    runs-on: ubuntu-latest
    steps:
      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Test decoder
        run: pnpm --filter @ox-jsdoc/decoder test

  build-napi:
    name: Build ${{ matrix.package_name }} (${{ matrix.target }})
    # Compile-time gate for `npm-publish`. Skipped on workflow_dispatch retries
    # that don't include `npm-publish`. `crate-publish` doesn't need NAPI
    # artifacts (cargo publishes a source tarball), so it's safe to skip here.
    if: >-
      github.event_name == 'push' || (github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'npm-publish'))


    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Only the canonical NAPI package needs native builds. The
        # `ox-jsdoc-binary` alias is a JS-only thin re-export of `ox-jsdoc`
        # and does not bundle a separate native binding. The `ox-jsdoc-origin`
        # package is `"private": true` and is not published.
        include:
          - package_name: ox-jsdoc
            package_path: napi/ox-jsdoc
            os: macos-latest
            target: aarch64-apple-darwin
            build: pnpm build --target aarch64-apple-darwin

          - package_name: ox-jsdoc
            package_path: napi/ox-jsdoc
            os: macos-latest
            target: x86_64-apple-darwin
            build: pnpm build --target x86_64-apple-darwin

          - package_name: ox-jsdoc
            package_path: napi/ox-jsdoc
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: pnpm build --target x86_64-unknown-linux-gnu --use-napi-cross

          - package_name: ox-jsdoc
            package_path: napi/ox-jsdoc
            os: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm build --target x86_64-pc-windows-msvc

    defaults:
      run:
        shell: bash

    steps:
      - name: Enable long paths
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Add Rust target
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "$TARGET"

      - name: Build native binding
        working-directory: ${{ matrix.package_path }}
        env:
          BUILD_CMD: ${{ matrix.build }}
        run: $BUILD_CMD

      - name: Upload native binding
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: ${{ matrix.package_name }}-${{ matrix.target }}
          path: |
            ${{ matrix.package_path }}/**/*.node
            ${{ matrix.package_path }}/**/bindings.js
            ${{ matrix.package_path }}/**/bindings.d.ts

  npm-publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    # Tag-push runs always go through this job. `workflow_dispatch` runs only
    # touch npm when `inputs.job` selects `all` or `npm-publish`; otherwise
    # the job is skipped (the npm registry rejects re-publishing the same
    # version).
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.test-decoder.result == 'success' &&
          needs.build-napi.result == 'success') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.job == 'all' || inputs.job == 'npm-publish') &&
          needs.test-decoder.result == 'success' &&
          needs.build-napi.result == 'success')
      )


    needs:
      - test-decoder
      - build-napi
    permissions:
      # Required for npm trusted publishing (OIDC).
      id-token: write
    steps:
      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.118 --locked --force

      - name: Build wasm packages
        # Only the canonical WASM package has a wasm-pack build. The
        # `@ox-jsdoc/wasm-binary` alias is a JS-only thin re-export, and
        # `@ox-jsdoc/wasm-origin` is `"private": true`.
        run: vpr -F '@ox-jsdoc/wasm' build --release

      - name: Build decoder
        run: vpr -F '@ox-jsdoc/decoder' build

      - name: Download native bindings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Publish wasm packages
        run: ./scripts/release.sh

      - name: Publish decoder
        working-directory: packages/decoder
        run: |
          publish_flags=(--access public --no-git-checks)
          pnpm publish "${publish_flags[@]}"

      - name: Publish ox-jsdoc
        run: |
          package_path=napi/ox-jsdoc
          npm_dir=release-dir/ox-jsdoc
          mkdir -p "${npm_dir}"
          pnpm -C "${package_path}" exec napi create-npm-dirs --package-json-path ../../${package_path}/package.json --npm-dir ../../${npm_dir}
          pnpm -C "${package_path}" exec napi artifacts --package-json-path ../../${package_path}/package.json --output-dir ../../artifacts --npm-dir ../../${npm_dir}
          pnpm -C "${package_path}" exec napi pre-publish --no-gh-release -t npm --package-json-path ../../${package_path}/package.json --npm-dir ../../${npm_dir}
          cp artifacts/ox-jsdoc-x86_64-unknown-linux-gnu/src-js/bindings.js "${package_path}/src-js/bindings.js"
          cp artifacts/ox-jsdoc-x86_64-unknown-linux-gnu/src-js/bindings.d.ts "${package_path}/src-js/bindings.d.ts"
          cd "${package_path}"
          node -e 'const fs = require("node:fs"); const pkg = JSON.parse(fs.readFileSync("package.json", "utf8")); const required = ["src-js/bindings.js", "src-js/bindings.d.ts", "src-js/index.js", "src-js/index.d.ts"]; pkg.files = [...new Set([...(pkg.files || []), ...required])]; fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");'
          npm pack --dry-run --json | node -e 'const fs = require("node:fs"); const [{ files }] = JSON.parse(fs.readFileSync(0, "utf8")); const paths = new Set(files.map(file => file.path)); for (const file of ["src-js/bindings.js", "src-js/bindings.d.ts", "src-js/index.js", "src-js/index.d.ts"]) { if (!paths.has(file)) throw new Error(file + " is missing from npm pack"); }'
          publish_flags=(--access public --no-git-checks)
          pnpm publish "${publish_flags[@]}"

      - name: Publish ox-jsdoc-binary alias
        # Post-cutover, `ox-jsdoc-binary` is a JS-only thin re-export of the
        # canonical `ox-jsdoc` package. No native binding bundling, no
        # `napi pre-publish`, no platform sub-package fan-out.
        working-directory: napi/ox-jsdoc-binary
        run: |
          publish_flags=(--access public --no-git-checks)
          pnpm publish "${publish_flags[@]}"

      - name: Publish jsdoccomment
        working-directory: packages/jsdoccomment
        run: |
          publish_flags=(--access public --no-git-checks)
          pnpm publish "${publish_flags[@]}"

      - name: Publish eslint-plugin-jsdoc
        working-directory: packages/eslint-plugin-jsdoc
        run: |
          publish_flags=(--access public --no-git-checks)
          pnpm publish "${publish_flags[@]}"

      - name: Smoke test published packages
        run: |
          version=$(node -p "require('./napi/ox-jsdoc/package.json').version")
          for package_name in @ox-jsdoc/decoder ox-jsdoc ox-jsdoc-binary @ox-jsdoc/jsdoccomment @ox-jsdoc/eslint-plugin-jsdoc; do
            for attempt in {1..12}; do
              if npm view "${package_name}@${version}" version >/dev/null 2>&1; then
                echo "${package_name}@${version} is available on npm"
                break
              fi
              if [[ "${attempt}" == "12" ]]; then
                echo "${package_name}@${version} is not available on npm after waiting" >&2
                exit 1
              fi
              echo "Waiting for ${package_name}@${version} to become available on npm (${attempt}/12)"
              sleep 10
            done
          done
          tmpdir=$(mktemp -d)
          cd "${tmpdir}"
          npm init -y
          npm install --ignore-scripts "@ox-jsdoc/decoder@${version}" "ox-jsdoc@${version}" "ox-jsdoc-binary@${version}" "@ox-jsdoc/jsdoccomment@${version}" "@ox-jsdoc/eslint-plugin-jsdoc@${version}"
          node --input-type=module -e "import('@ox-jsdoc/decoder').then(() => console.log('@ox-jsdoc/decoder smoke ok'))"
          node --input-type=module -e "import { parse } from 'ox-jsdoc'; const result = parse('/** hi */'); if (result.diagnostics.length !== 0) throw new Error('ox-jsdoc diagnostics mismatch'); console.log('ox-jsdoc smoke ok')"
          node --input-type=module -e "import { parse } from 'ox-jsdoc-binary'; const result = parse('/** hi */'); if (result.diagnostics.length !== 0) throw new Error('ox-jsdoc-binary diagnostics mismatch'); console.log('ox-jsdoc-binary smoke ok')"
          node --input-type=module -e "import { parseComment } from '@ox-jsdoc/jsdoccomment'; const block = parseComment('/** hi */'); if (!block.description.includes('hi')) throw new Error('@ox-jsdoc/jsdoccomment smoke mismatch'); console.log('@ox-jsdoc/jsdoccomment smoke ok')"
          node --input-type=module -e "import jsdoc from '@ox-jsdoc/eslint-plugin-jsdoc'; if (!jsdoc?.rules) throw new Error('@ox-jsdoc/eslint-plugin-jsdoc rules missing'); console.log('@ox-jsdoc/eslint-plugin-jsdoc smoke ok')"

  crate-publish:
    name: Publish ox_jsdoc to crates.io
    runs-on: ubuntu-latest
    # Runs in parallel with `npm-publish` (the two registries are independent
    # and the cargo source tarball does not require the NAPI artifacts).
    # `test-decoder` and `build-napi` remain as regression / compile-time
    # gates on tag-push; on workflow_dispatch retries they are skipped (the
    # operator has already vetted the tag).
    needs:
      - test-decoder
      - build-napi
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.test-decoder.result == 'success' &&
          needs.build-napi.result == 'success') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.job == 'all' || inputs.job == 'crate-publish') &&
          (needs.test-decoder.result == 'success' || needs.test-decoder.result == 'skipped') &&
          (needs.build-napi.result == 'success' || needs.build-napi.result == 'skipped'))
      )


    permissions:
      # Required for crates.io trusted publishing (OIDC).
      id-token: write
    steps:
      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Install Rust toolchain
        # rust-toolchain.toml at the repo root pins the channel; `rustup show`
        # honors it and installs the matching toolchain.
        run: rustup show

      - name: Verify Cargo.toml version matches $TAG
        # Always enforced: the checkout above pins to `$TAG`, so the tag
        # string must agree with the Cargo.toml version on that commit.
        run: |
          tag_version="${TAG#v}"
          cargo_version=$(grep '^version = ' crates/ox_jsdoc/Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "tag version $tag_version does not match crates/ox_jsdoc/Cargo.toml version $cargo_version" >&2
            exit 1
          fi

      - name: cargo publish dry-run
        # `--dry-run` only hits the crates.io index for sanity, no auth needed.
        run: cargo publish --dry-run -p ox_jsdoc

      - name: Authenticate crates.io via Trusted Publishing
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: cargo publish
        env:
          # Short-lived token produced by the trusted-publishing step. cargo
          # always reads the token from `CARGO_REGISTRY_TOKEN`, but the value
          # here is the OIDC-derived ephemeral token — not a long-lived
          # repository secret. The token is auto-revoked when the job ends.
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p ox_jsdoc

  release-notes:
    name: Sync changelog and create GitHub Release
    runs-on: ubuntu-latest
    # Waits for both publish jobs so the GitHub Release and CHANGELOG only
    # appear once npm and crates.io are both green — a half-released state
    # (e.g. npm OK / crates NG) doesn't produce a misleading Release.
    needs:
      - npm-publish
      - crate-publish
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.npm-publish.result == 'success' &&
          needs.crate-publish.result == 'success') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.job == 'release-notes' ||
            (inputs.job == 'all' &&
              needs.npm-publish.result == 'success' &&
              needs.crate-publish.result == 'success')))
      )


    permissions:
      # Required for stefanzweifel/git-auto-commit-action to push the
      # CHANGELOG commit back to `main`.
      contents: write
    steps:
      # zizmor: ignore[artipacked] — git-auto-commit-action needs the
      # credentials persisted here in order to push the CHANGELOG commit.
      - name: Checkout main # zizmor: ignore[artipacked]
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: 24
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Create GitHub Release (skip if exists)
        # Skipping avoids upserting a Release that already exists, so the
        # operator can retry this job for changelog sync alone.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping creation"
          else
            gh release create "$TAG" --generate-notes
          fi

      - name: Sync changelog from GitHub releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: vp exec gh-changelogen --repo=kazupon/ox-jsdoc --tag="$TAG"

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          branch: main
          file_pattern: CHANGELOG.md
          commit_message: 'chore: generate changelog'
