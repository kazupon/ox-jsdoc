name: Reproduire
on:
  issues:
    types: [labeled]

permissions:
  contents: read

jobs:
  reproduire:
    runs-on: ubuntu-latest
    permissions:
      # Required by Hebilicious/reproduire to label / comment on issues
      # when the configured trigger label is applied.
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: Hebilicious/reproduire@4b686ae9cbb72dad60f001d278b6e3b2ce40a9ac # v0.0.9
        with:
          label: 'status: need more repro codes or info' # Optional, will default to this value.
