name: Label sync

on:
  push:
    branches:
      - main
    paths:
      - .github/labels.yml
      - .github/workflows/github-label-sync.yml
  workflow_dispatch: # eslint-disable-line yml/no-empty-mapping-value -- NOTE(kazupon): to run action with manually on GitHub UI

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      # Required by r7kamura/github-label-sync-action to create/update/delete
      # labels (labels are part of the GitHub Issues API).
      issues: write
    steps:
      - uses: r7kamura/github-label-sync-action@061649dd3b80eb5bafad0316466f72962e62c300 # v0.1.0
