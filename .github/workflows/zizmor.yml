name: GitHub Actions Security Analysis with zizmor

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
  pull_request:
    branches:
      - '**'
    paths:
      - .github/workflows/**
  workflow_dispatch: # eslint-disable-line yml/no-empty-mapping-value -- NOTE(kazupon): allow manual re-runs

permissions: {}

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    permissions:
      # Required to upload SARIF results to GitHub Code Scanning.
      security-events: write
      # Required for `actions/checkout` to clone the repository so zizmor
      # can read `.github/workflows/`.
      contents: read
      # Required by `zizmor-action` to query workflow run metadata via the
      # GitHub Actions REST API.
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
