<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1180" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">
  <defs>
    <style>
      .title { font-size: 25px; font-weight: 700; fill: #14213d; }
      .subtitle { font-size: 14px; fill: #607089; }
      .section { font-size: 17px; font-weight: 700; fill: #26364f; }
      .mono { font-family: Menlo, Consolas, monospace; }
      .note { font-size: 12px; fill: #64748b; }
      .source rect { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.3; rx: 8; ry: 8; }
      .arena rect { fill: #fff; stroke: #94a3b8; stroke-width: 1.6; rx: 10; ry: 10; }
      .node rect { fill: #eaf4ff; stroke: #2563eb; stroke-width: 1.4; rx: 8; ry: 8; }
      .node .name { fill: #1d4ed8; font-weight: 700; font-size: 14px; }
      .vec rect { fill: #fffbea; stroke: #eab308; stroke-width: 1.4; rx: 8; ry: 8; }
      .vec .name { fill: #a16207; font-weight: 700; font-size: 14px; }
      .js rect { fill: #fdf2f8; stroke: #db2777; stroke-width: 1.5; rx: 8; ry: 8; }
      .js .name { fill: #be185d; font-weight: 700; font-size: 14px; }
      .phase rect { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.3; rx: 8; ry: 8; }
      .phase .name { fill: #334155; font-weight: 700; font-size: 14px; }
      .field { fill: #334155; font-size: 12px; }
      .addr { fill: #94a3b8; font-size: 10px; }
      .ptr-box { stroke: #dc2626; stroke-width: 1.5; fill: none; }
      .ptr-vec { stroke: #2563eb; stroke-width: 1.8; fill: none; }
      .ptr-str { stroke: #16a34a; stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; }
      .ptr-js { stroke: #db2777; stroke-width: 1.5; fill: none; }
    </style>
    <marker id="red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="pink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#db2777"/>
    </marker>
  </defs>

  <text x="800" y="42" text-anchor="middle" class="title">ox-jsdoc AST Memory and Transfer Model</text>
  <text x="800" y="66" text-anchor="middle" class="subtitle">Rust keeps Span and borrowed slices; JS binding emits ESTree-like fields</text>

  <g class="phase" transform="translate(70, 95)">
    <rect x="0" y="0" width="1460" height="76"/>
    <text x="20" y="28" class="name">Pointer legend</text>
    <line x1="150" y1="25" x2="210" y2="25" class="ptr-box" marker-end="url(#red)"/>
    <text x="220" y="29" class="field">Box&lt;'a, T&gt; arena pointer</text>
    <line x1="430" y1="25" x2="490" y2="25" class="ptr-vec" marker-end="url(#blue)"/>
    <text x="500" y="29" class="field">Vec&lt;'a, T&gt; backing storage</text>
    <line x1="740" y1="25" x2="800" y2="25" class="ptr-str" marker-end="url(#green)"/>
    <text x="810" y="29" class="field">&amp;'a str slice into caller-owned source</text>
    <line x1="1120" y1="25" x2="1180" y2="25" class="ptr-js" marker-end="url(#pink)"/>
    <text x="1190" y="29" class="field">serialization to JS / JSON object</text>
    <text x="20" y="58" class="note">The core AST never stores string node kinds. Node kind is Rust type internally and "type" string only in JS-facing output.</text>
  </g>

  <text x="70" y="225" class="section">1. Caller-owned source</text>
  <g class="source" transform="translate(70, 250)">
    <rect x="0" y="0" width="1460" height="86"/>
    <text x="18" y="25" class="addr mono">source buffer</text>
    <text x="18" y="51" class="mono" font-size="12" fill="#334155">"/** Find a user. See {@link UserService}.\n * @param {string|number} id - The user ID\n */"</text>
    <text x="18" y="72" class="note">AST strings are normally borrowed slices into this buffer. Serialization creates JS strings later.</text>
  </g>

  <text x="70" y="390" class="section">2. Rust arena AST</text>
  <g class="arena" transform="translate(70, 420)">
    <rect x="0" y="0" width="960" height="650"/>
    <text x="22" y="30" class="name">Bump arena</text>
    <text x="22" y="52" class="note">Sequential allocations. All nodes are freed together with the arena.</text>

    <g class="node" transform="translate(35, 85)">
      <rect x="0" y="0" width="420" height="116"/>
      <text x="18" y="26" class="name mono">JsdocBlock&lt;'a&gt;</text>
      <text x="18" y="52" class="field mono">span: Span { start, end }</text>
      <text x="18" y="72" class="field mono">description: Option&lt;&amp;'a str&gt;</text>
      <text x="18" y="92" class="field mono">description_lines: Vec&lt;JsdocDescriptionLine&gt;</text>
      <text x="18" y="112" class="field mono">tags: Vec&lt;JsdocTag&gt;  inline_tags: Vec&lt;JsdocInlineTag&gt;</text>
    </g>

    <g class="vec" transform="translate(500, 85)">
      <rect x="0" y="0" width="420" height="116"/>
      <text x="18" y="26" class="name mono">Vec&lt;JsdocTag&gt; backing</text>
      <text x="18" y="52" class="field mono">[0] JsdocTag { tag: "param", rawType, name }</text>
      <text x="18" y="72" class="field mono">[1] JsdocTag { tag: "returns", rawType }</text>
      <text x="18" y="92" class="field mono">common case is contiguous tag traversal</text>
    </g>

    <path d="M 350,178 L 500,150" class="ptr-vec" marker-end="url(#blue)"/>

    <g class="vec" transform="translate(35, 250)">
      <rect x="0" y="0" width="420" height="116"/>
      <text x="18" y="26" class="name mono">Vec&lt;JsdocDescriptionLine&gt;</text>
      <text x="18" y="52" class="field mono">delimiter: "*"</text>
      <text x="18" y="72" class="field mono">description: &amp;'a str -&gt; source slice</text>
      <text x="18" y="92" class="field mono">preserves line-level formatter data</text>
    </g>

    <g class="node" transform="translate(500, 250)">
      <rect x="0" y="0" width="420" height="136"/>
      <text x="18" y="26" class="name mono">JsdocTag&lt;'a&gt;</text>
      <text x="18" y="52" class="field mono">tag.value: &amp;'a str -&gt; "param"</text>
      <text x="18" y="72" class="field mono">raw_type.raw: &amp;'a str -&gt; "string|number"</text>
      <text x="18" y="92" class="field mono">name.raw: &amp;'a str -&gt; "id"</text>
      <text x="18" y="112" class="field mono">body: Option&lt;Box&lt;JsdocTagBody&gt;&gt;</text>
      <text x="18" y="132" class="field mono">parsed_type: None in parser-only mode</text>
    </g>

    <path d="M 365,295 L 500,305" class="ptr-vec" marker-end="url(#blue)"/>

    <g class="node" transform="translate(35, 430)">
      <rect x="0" y="0" width="420" height="120"/>
      <text x="18" y="26" class="name mono">JsdocInlineTag&lt;'a&gt;</text>
      <text x="18" y="52" class="field mono">tag.value: "link"</text>
      <text x="18" y="72" class="field mono">namepath_or_url: "UserService"</text>
      <text x="18" y="92" class="field mono">format: Plain</text>
      <text x="18" y="112" class="field mono">raw_body preserved for unknown tags</text>
    </g>

    <g class="node" transform="translate(500, 450)">
      <rect x="0" y="0" width="420" height="100"/>
      <text x="18" y="26" class="name mono">JsdocTagBody::Generic</text>
      <text x="18" y="52" class="field mono">type_source + value + separator + description</text>
      <text x="18" y="72" class="field mono">broad syntax, semantics resolved later</text>
    </g>

    <path d="M 800,362 L 720,450" class="ptr-box" marker-end="url(#red)"/>
  </g>

  <path d="M 520,336 C 360,370 250,395 210,505" class="ptr-str" marker-end="url(#green)"/>
  <path d="M 830,336 C 930,390 950,500 770,518" class="ptr-str" marker-end="url(#green)"/>
  <path d="M 580,336 C 450,585 290,720 260,850" class="ptr-str" marker-end="url(#green)"/>

  <text x="1090" y="390" class="section">3. JS / JSON transfer</text>
  <g class="js" transform="translate(1090, 420)">
    <rect x="0" y="0" width="440" height="300"/>
    <text x="20" y="30" class="name">ESTree-like output</text>
    <text x="20" y="60" class="mono field">{</text>
    <text x="38" y="82" class="mono field">type: "JsdocTag",</text>
    <text x="38" y="104" class="mono field">start: 42,</text>
    <text x="38" y="126" class="mono field">end: 88,</text>
    <text x="38" y="148" class="mono field">range: [42, 88],</text>
    <text x="38" y="170" class="mono field">tag: "param",</text>
    <text x="38" y="192" class="mono field">rawType: "string|number",</text>
    <text x="38" y="214" class="mono field">name: "id",</text>
    <text x="38" y="236" class="mono field">description: "The user ID",</text>
    <text x="38" y="258" class="mono field">parsedType: null</text>
    <text x="20" y="280" class="mono field">}</text>
  </g>

  <path d="M 1030,720 C 1060,650 1070,575 1090,555" class="ptr-js" marker-end="url(#pink)"/>

  <g class="phase" transform="translate(1090, 760)">
    <rect x="0" y="0" width="440" height="150"/>
    <text x="20" y="30" class="name">Transfer rules</text>
    <text x="20" y="58" class="note">1. Rust nodes store Span, not start/end/range/loc fields.</text>
    <text x="20" y="82" class="note">2. JS output emits "type" strings for ESTree compatibility.</text>
    <text x="20" y="106" class="note">3. range and loc are serialization options, not core AST layout.</text>
    <text x="20" y="130" class="note">4. Type/namepath parsing can be attached after the parser phase.</text>
  </g>

  <g class="phase" transform="translate(70, 1100)">
    <rect x="0" y="0" width="1460" height="52"/>
    <text x="20" y="32" class="note">Memory policy: parser allocates node structure in the arena, borrows source text, and leaves semantic expansion to validator/analyzer/type-parser phases.</text>
  </g>
</svg>
