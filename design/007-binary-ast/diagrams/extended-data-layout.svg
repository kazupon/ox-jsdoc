<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" font-family="monospace" font-size="13">
  <defs>
    <linearGradient id="gStr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#50b86c"/>
      <stop offset="100%" stop-color="#3da558"/>
    </linearGradient>
    <linearGradient id="gBitmask" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8e6cbf"/>
      <stop offset="100%" stop-color="#7b59ac"/>
    </linearGradient>
    <linearGradient id="gMeta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5fc4d3"/>
      <stop offset="100%" stop-color="#38b6c8"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a838"/>
      <stop offset="100%" stop-color="#d49520"/>
    </linearGradient>
    <linearGradient id="gBool" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d95050"/>
      <stop offset="100%" stop-color="#c43e3e"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222" font-family="-apple-system, system-ui, sans-serif">Extended Data Internal Layout</text>
  <text x="460" y="50" text-anchor="middle" font-size="11" fill="#666" font-family="-apple-system, system-ui, sans-serif">Per-node fixed schema with mixed-type fields (u8 / u16 / u32) — decoder reads bytes by type per node Kind</text>

  <!-- ============================================================ -->
  <!-- Section 1: Type legend                                       -->
  <!-- ============================================================ -->
  <text x="40" y="82" font-size="13" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">(1) Field types in Extended Data</text>

  <g transform="translate(40, 95)">
    <!-- u16 string index -->
    <rect width="160" height="55" rx="5" fill="url(#gStr)" opacity="0.85" stroke="#3da558" stroke-width="1.5"/>
    <text x="80" y="20" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">u16 string index</text>
    <text x="80" y="35" text-anchor="middle" fill="#e8f5ec" font-size="9">2 bytes — main type</text>
    <text x="80" y="48" text-anchor="middle" fill="#e8f5ec" font-size="9">None = 0xFFFF</text>

    <!-- u8 Children bitmask -->
    <rect x="170" width="160" height="55" rx="5" fill="url(#gBitmask)" opacity="0.85" stroke="#7b59ac" stroke-width="1.5"/>
    <text x="250" y="20" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">u8 Children bitmask</text>
    <text x="250" y="35" text-anchor="middle" fill="#efeaf5" font-size="9">1 byte — child slots</text>
    <text x="250" y="48" text-anchor="middle" fill="#efeaf5" font-size="9">visitor order bit map</text>

    <!-- u16 metadata -->
    <rect x="340" width="160" height="55" rx="5" fill="url(#gMeta)" opacity="0.85" stroke="#2a8d9c" stroke-width="1.5"/>
    <text x="420" y="20" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">u16 metadata</text>
    <text x="420" y="35" text-anchor="middle" fill="#e0f5f8" font-size="9">2 bytes — array count etc.</text>
    <text x="420" y="48" text-anchor="middle" fill="#e0f5f8" font-size="9">(TypeTemplateLiteral)</text>

    <!-- u32 line index (exception) -->
    <rect x="510" width="160" height="55" rx="5" fill="url(#gLine)" opacity="0.85" stroke="#d49520" stroke-width="2.5" stroke-dasharray="5,2"/>
    <text x="590" y="20" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">u32 line index ★</text>
    <text x="590" y="35" text-anchor="middle" fill="#fff5e0" font-size="9">4 bytes — JsdocBlock</text>
    <text x="590" y="48" text-anchor="middle" fill="#fff5e0" font-size="9">compat only, None = 0xFFFFFFFF</text>

    <!-- u8 boolean (exception) -->
    <rect x="680" width="160" height="55" rx="5" fill="url(#gBool)" opacity="0.85" stroke="#c43e3e" stroke-width="2.5" stroke-dasharray="5,2"/>
    <text x="760" y="20" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">u8 boolean ★</text>
    <text x="760" y="35" text-anchor="middle" fill="#fce8e8" font-size="9">1 byte — JsdocBlock</text>
    <text x="760" y="48" text-anchor="middle" fill="#fce8e8" font-size="9">compat only, None = 0xFF</text>
  </g>

  <!-- Padding note -->
  <g transform="translate(40, 162)">
    <rect width="270" height="22" rx="3" fill="#bbb" opacity="0.5" stroke="#888" stroke-width="1"/>
    <text x="135" y="15" text-anchor="middle" fill="#444" font-size="10">(padding: 1-6 bytes for u16/u32 alignment)</text>

    <text x="290" y="15" fill="#888" font-size="10" font-style="italic">★ = exception (only in JsdocBlock compat extension)</text>
  </g>

  <!-- ============================================================ -->
  <!-- Section 2: JsdocBlock as example (most complex)              -->
  <!-- ============================================================ -->
  <text x="40" y="220" font-size="13" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">(2) Example: <tspan font-family="monospace" fill="#7b59ac">JsdocBlock</tspan> Extended Data — uses all 5 field types + padding</text>

  <!-- ============================================================ -->
  <!-- Basic part 18 bytes                                          -->
  <!-- ============================================================ -->
  <text x="40" y="248" font-size="11" font-weight="bold" fill="#3da558" font-family="-apple-system, system-ui, sans-serif">Basic part (18 bytes — always present)</text>

  <g transform="translate(40, 258)">
    <!-- Cell layout: 1 byte = 30px width unit -->
    <!-- bitmask (u8, 1 byte = 30px) -->
    <rect width="30" height="55" rx="3" fill="url(#gBitmask)" opacity="0.85" stroke="#7b59ac" stroke-width="1"/>
    <text x="15" y="22" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">B</text>
    <text x="15" y="35" text-anchor="middle" fill="#efeaf5" font-size="7">bitmask</text>
    <text x="15" y="46" text-anchor="middle" fill="#efeaf5" font-size="7">u8</text>

    <!-- padding (u8, 1 byte = 30px) -->
    <rect x="30" width="30" height="55" rx="3" fill="#bbb" opacity="0.5" stroke="#888" stroke-width="1"/>
    <text x="45" y="22" text-anchor="middle" fill="#444" font-size="9" font-weight="bold">P</text>
    <text x="45" y="35" text-anchor="middle" fill="#444" font-size="7">pad</text>
    <text x="45" y="46" text-anchor="middle" fill="#444" font-size="7">u8</text>

    <!-- description (u16, 2 bytes = 60px) -->
    <rect x="60" width="60" height="55" rx="3" fill="url(#gStr)" opacity="0.85" stroke="#3da558" stroke-width="1"/>
    <text x="90" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">description</text>
    <text x="90" y="38" text-anchor="middle" fill="#e8f5ec" font-size="9">u16 string idx</text>

    <!-- 7 delimiters (u16 each, 60px each) -->
    <rect x="120" width="60" height="55" rx="3" fill="url(#gStr)" opacity="0.7" stroke="#3da558" stroke-width="1"/>
    <text x="150" y="22" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">delimiter</text>
    <text x="150" y="38" text-anchor="middle" fill="#e8f5ec" font-size="9">u16</text>

    <rect x="180" width="60" height="55" rx="3" fill="url(#gStr)" opacity="0.85" stroke="#3da558" stroke-width="1"/>
    <text x="210" y="22" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">post_delim</text>
    <text x="210" y="38" text-anchor="middle" fill="#e8f5ec" font-size="9">u16</text>

    <rect x="240" width="60" height="55" rx="3" fill="url(#gStr)" opacity="0.7" stroke="#3da558" stroke-width="1"/>
    <text x="270" y="22" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">terminal</text>
    <text x="270" y="38" text-anchor="middle" fill="#e8f5ec" font-size="9">u16</text>

    <rect x="300" width="60" height="55" rx="3" fill="url(#gStr)" opacity="0.85" stroke="#3da558" stroke-width="1"/>
    <text x="330" y="22" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">line_end</text>
    <text x="330" y="38" text-anchor="middle" fill="#e8f5ec" font-size="9">u16</text>

    <rect x="360" width="60" height="55" rx="3" fill="url(#gStr)" opacity="0.7" stroke="#3da558" stroke-width="1"/>
    <text x="390" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">initial</text>
    <text x="390" y="38" text-anchor="middle" fill="#e8f5ec" font-size="9">u16</text>

    <rect x="420" width="60" height="55" rx="3" fill="url(#gStr)" opacity="0.85" stroke="#3da558" stroke-width="1"/>
    <text x="450" y="22" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">delim_lb</text>
    <text x="450" y="38" text-anchor="middle" fill="#e8f5ec" font-size="9">u16</text>

    <rect x="480" width="60" height="55" rx="3" fill="url(#gStr)" opacity="0.7" stroke="#3da558" stroke-width="1"/>
    <text x="510" y="22" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">preterm_lb</text>
    <text x="510" y="38" text-anchor="middle" fill="#e8f5ec" font-size="9">u16</text>

    <!-- Byte index labels below cells -->
    <text x="15" y="70" text-anchor="middle" fill="#888" font-size="9">0</text>
    <text x="45" y="70" text-anchor="middle" fill="#888" font-size="9">1</text>
    <text x="90" y="70" text-anchor="middle" fill="#888" font-size="9">2-3</text>
    <text x="150" y="70" text-anchor="middle" fill="#888" font-size="9">4-5</text>
    <text x="210" y="70" text-anchor="middle" fill="#888" font-size="9">6-7</text>
    <text x="270" y="70" text-anchor="middle" fill="#888" font-size="9">8-9</text>
    <text x="330" y="70" text-anchor="middle" fill="#888" font-size="9">10-11</text>
    <text x="390" y="70" text-anchor="middle" fill="#888" font-size="9">12-13</text>
    <text x="450" y="70" text-anchor="middle" fill="#888" font-size="9">14-15</text>
    <text x="510" y="70" text-anchor="middle" fill="#888" font-size="9">16-17</text>

    <!-- End marker -->
    <line x1="540" y1="0" x2="540" y2="55" stroke="#666" stroke-width="2"/>
    <text x="555" y="32" fill="#666" font-size="10" font-style="italic">← byte 18 (basic ends)</text>
  </g>

  <!-- ============================================================ -->
  <!-- Compat extension 22 bytes                                    -->
  <!-- ============================================================ -->
  <text x="40" y="365" font-size="11" font-weight="bold" fill="#d49520" font-family="-apple-system, system-ui, sans-serif">Compat extension (+22 bytes — when Header bit0 = 1)</text>

  <g transform="translate(40, 375)">
    <!-- padding (u16, 2 bytes = 60px) - alignment for u32 -->
    <rect width="60" height="55" rx="3" fill="#bbb" opacity="0.5" stroke="#888" stroke-width="1"/>
    <text x="30" y="22" text-anchor="middle" fill="#444" font-size="11" font-weight="bold">pad</text>
    <text x="30" y="38" text-anchor="middle" fill="#444" font-size="9">u16 align</text>

    <!-- end_line (u32, 4 bytes = 120px) -->
    <rect x="60" width="120" height="55" rx="3" fill="url(#gLine)" opacity="0.85" stroke="#d49520" stroke-width="1.5"/>
    <text x="120" y="22" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">end_line</text>
    <text x="120" y="38" text-anchor="middle" fill="#fff5e0" font-size="10">u32 line index ★</text>

    <!-- description_start_line (u32) -->
    <rect x="180" width="120" height="55" rx="3" fill="url(#gLine)" opacity="0.75" stroke="#d49520" stroke-width="1.5"/>
    <text x="240" y="22" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">desc_start_line</text>
    <text x="240" y="38" text-anchor="middle" fill="#fff5e0" font-size="10">u32 ★</text>

    <!-- description_end_line (u32) -->
    <rect x="300" width="120" height="55" rx="3" fill="url(#gLine)" opacity="0.85" stroke="#d49520" stroke-width="1.5"/>
    <text x="360" y="22" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">desc_end_line</text>
    <text x="360" y="38" text-anchor="middle" fill="#fff5e0" font-size="10">u32 ★</text>

    <!-- last_description_line (u32) -->
    <rect x="420" width="120" height="55" rx="3" fill="url(#gLine)" opacity="0.75" stroke="#d49520" stroke-width="1.5"/>
    <text x="480" y="22" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">last_desc_line</text>
    <text x="480" y="38" text-anchor="middle" fill="#fff5e0" font-size="10">u32 ★</text>

    <!-- has_preterminal_description (u8, 1 byte = 30px) -->
    <rect x="540" width="30" height="55" rx="3" fill="url(#gBool)" opacity="0.85" stroke="#c43e3e" stroke-width="1.5"/>
    <text x="555" y="22" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">Hp</text>
    <text x="555" y="38" text-anchor="middle" fill="#fce8e8" font-size="8">u8 ★</text>

    <!-- has_preterminal_tag_description (u8) -->
    <rect x="570" width="30" height="55" rx="3" fill="url(#gBool)" opacity="0.75" stroke="#c43e3e" stroke-width="1.5"/>
    <text x="585" y="22" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">Hpt</text>
    <text x="585" y="38" text-anchor="middle" fill="#fce8e8" font-size="8">u8 ★</text>

    <!-- trailing padding (u16, 2 bytes = 60px) -->
    <rect x="600" width="60" height="55" rx="3" fill="#bbb" opacity="0.5" stroke="#888" stroke-width="1"/>
    <text x="630" y="22" text-anchor="middle" fill="#444" font-size="11" font-weight="bold">pad</text>
    <text x="630" y="38" text-anchor="middle" fill="#444" font-size="9">trailing</text>

    <!-- Byte index labels below cells -->
    <text x="30" y="70" text-anchor="middle" fill="#888" font-size="9">18-19</text>
    <text x="120" y="70" text-anchor="middle" fill="#888" font-size="9">20-23</text>
    <text x="240" y="70" text-anchor="middle" fill="#888" font-size="9">24-27</text>
    <text x="360" y="70" text-anchor="middle" fill="#888" font-size="9">28-31</text>
    <text x="480" y="70" text-anchor="middle" fill="#888" font-size="9">32-35</text>
    <text x="555" y="70" text-anchor="middle" fill="#888" font-size="9">36</text>
    <text x="585" y="70" text-anchor="middle" fill="#888" font-size="9">37</text>
    <text x="630" y="70" text-anchor="middle" fill="#888" font-size="9">38-39</text>

    <!-- End marker -->
    <line x1="660" y1="0" x2="660" y2="55" stroke="#666" stroke-width="2"/>
    <text x="675" y="32" fill="#666" font-size="10" font-style="italic">← byte 40 (compat ends)</text>
  </g>

  <!-- Total size annotations -->
  <g transform="translate(40, 470)">
    <text x="0" y="14" fill="#3da558" font-size="11" font-weight="bold" font-family="-apple-system, system-ui, sans-serif">★ Basic = 18 bytes (8 fields)</text>
    <text x="200" y="14" fill="#888" font-size="10" font-family="-apple-system, system-ui, sans-serif">|</text>
    <text x="220" y="14" fill="#d49520" font-size="11" font-weight="bold" font-family="-apple-system, system-ui, sans-serif">+ Compat = 22 bytes (4 × u32 + 2 × u8 + 4 padding)</text>
    <text x="600" y="14" fill="#888" font-size="10" font-family="-apple-system, system-ui, sans-serif">=</text>
    <text x="620" y="14" fill="#444" font-size="11" font-weight="bold" font-family="-apple-system, system-ui, sans-serif">Total compat = 40 bytes</text>
  </g>

  <!-- ============================================================ -->
  <!-- Section 3: Notes                                             -->
  <!-- ============================================================ -->
  <g transform="translate(40, 510)">
    <rect width="840" height="195" rx="6" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="15" y="22" font-size="12" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">Decoder rules</text>

    <text x="15" y="46" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan font-weight="bold">Kind-aware reading</tspan>: each node Kind has a fixed schema. Decoder reads bytes per type (u8 / u16 / u32) per offset</text>
    <text x="15" y="64" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan font-weight="bold" fill="#c43e3e">No generic reader</tspan>: a "treat all Extended Data as u16 array" reader is incorrect — JsdocBlock compat will be misread</text>
    <text x="15" y="82" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan font-weight="bold">Alignment</tspan>: u16 → 2-byte boundary, u32 → 4-byte boundary (padding inserted as needed)</text>
    <text x="15" y="100" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan font-weight="bold">Compat branching</tspan>: decoder checks Header bit0 (compat_mode). If 0, stop after basic part; if 1, continue into compat extension</text>
    <text x="15" y="118" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan font-weight="bold">None sentinels</tspan>: u16 string idx → 0xFFFF | u32 line index → 0xFFFFFFFF | u8 boolean → 0xFF</text>

    <line x1="15" y1="135" x2="825" y2="135" stroke="#ddd" stroke-width="1"/>

    <text x="15" y="155" font-size="11" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">Why u32 for line indices? (★ exception)</text>
    <text x="15" y="173" font-size="10" fill="#666" font-family="-apple-system, system-ui, sans-serif">Line numbers refer to absolute line in source file. Files like typescript-checker.ts have ~54,000 lines — close to u16 limit (65,535).</text>
    <text x="15" y="187" font-size="10" fill="#666" font-family="-apple-system, system-ui, sans-serif">u32 (4G lines) provides ample safety margin. Other Extended Data fields stay u16 for size efficiency.</text>
  </g>
</svg>
