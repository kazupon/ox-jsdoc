<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 660" font-family="monospace" font-size="13">
  <defs>
    <linearGradient id="gNL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a838"/>
      <stop offset="100%" stop-color="#d49520"/>
    </linearGradient>
    <linearGradient id="gReserved" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cccccc"/>
      <stop offset="100%" stop-color="#aaaaaa"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222" font-family="-apple-system, system-ui, sans-serif">JsdocBlock Children Bitmask (Extended Data byte 0)</text>
  <text x="460" y="50" text-anchor="middle" font-size="11" fill="#666" font-family="-apple-system, system-ui, sans-serif">8-bit field — only 3 bits used (3 NodeList children); bits 3-7 reserved for future expansion</text>

  <!-- ============================================================ -->
  <!-- Section 1: 8-bit cell layout                                 -->
  <!-- ============================================================ -->
  <text x="40" y="82" font-size="13" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">(1) Bit layout (8 bits, only bits 0-2 are used)</text>

  <g transform="translate(40, 95)">
    <!-- bit 0: descriptionLines (NodeList) -->
    <rect width="110" height="135" rx="6" fill="url(#gNL)" opacity="0.85" stroke="#d49520" stroke-width="1.5"/>
    <text x="55" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">bit 0</text>
    <text x="55" y="50" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">description-</text>
    <text x="55" y="64" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Lines</text>
    <text x="55" y="80" text-anchor="middle" font-size="9" fill="#fff5e0">JsdocDesc...[]</text>
    <line x1="10" y1="90" x2="100" y2="90" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
    <text x="55" y="108" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">NodeList</text>
    <text x="55" y="124" text-anchor="middle" font-size="9" fill="#fff5e0">(skip if empty)</text>

    <!-- bit 1: tags (NodeList) -->
    <rect x="115" width="110" height="135" rx="6" fill="url(#gNL)" opacity="0.85" stroke="#d49520" stroke-width="1.5"/>
    <text x="170" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">bit 1</text>
    <text x="170" y="55" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">tags</text>
    <text x="170" y="74" text-anchor="middle" font-size="9" fill="#fff5e0">JsdocTag[]</text>
    <line x1="125" y1="85" x2="215" y2="85" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
    <text x="170" y="105" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">NodeList</text>
    <text x="170" y="122" text-anchor="middle" font-size="9" fill="#fff5e0">(skip if empty)</text>

    <!-- bit 2: inlineTags (NodeList) -->
    <rect x="230" width="110" height="135" rx="6" fill="url(#gNL)" opacity="0.85" stroke="#d49520" stroke-width="1.5"/>
    <text x="285" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">bit 2</text>
    <text x="285" y="50" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">inline-</text>
    <text x="285" y="64" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Tags</text>
    <text x="285" y="80" text-anchor="middle" font-size="9" fill="#fff5e0">JsdocInlineTag[]</text>
    <line x1="240" y1="90" x2="330" y2="90" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
    <text x="285" y="108" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">NodeList</text>
    <text x="285" y="124" text-anchor="middle" font-size="9" fill="#fff5e0">(skip if empty)</text>

    <!-- bit 3-7: reserved (5 cells with same style) -->
    <rect x="345" width="110" height="135" rx="6" fill="url(#gReserved)" opacity="0.6" stroke="#888" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="400" y="22" text-anchor="middle" font-size="11" fill="#666" font-weight="bold">bit 3</text>
    <text x="400" y="60" text-anchor="middle" font-size="13" fill="#666" font-weight="bold">RSV</text>
    <text x="400" y="80" text-anchor="middle" font-size="9" fill="#666">(reserved)</text>
    <line x1="355" y1="90" x2="445" y2="90" stroke="#666" stroke-width="0.5" opacity="0.5"/>
    <text x="400" y="108" text-anchor="middle" font-size="11" fill="#666" font-weight="bold">always 0</text>
    <text x="400" y="124" text-anchor="middle" font-size="9" fill="#888">future use</text>

    <rect x="460" width="110" height="135" rx="6" fill="url(#gReserved)" opacity="0.6" stroke="#888" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="515" y="22" text-anchor="middle" font-size="11" fill="#666" font-weight="bold">bit 4</text>
    <text x="515" y="60" text-anchor="middle" font-size="13" fill="#666" font-weight="bold">RSV</text>
    <text x="515" y="80" text-anchor="middle" font-size="9" fill="#666">(reserved)</text>
    <line x1="470" y1="90" x2="560" y2="90" stroke="#666" stroke-width="0.5" opacity="0.5"/>
    <text x="515" y="108" text-anchor="middle" font-size="11" fill="#666" font-weight="bold">always 0</text>
    <text x="515" y="124" text-anchor="middle" font-size="9" fill="#888">future use</text>

    <rect x="575" width="110" height="135" rx="6" fill="url(#gReserved)" opacity="0.6" stroke="#888" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="630" y="22" text-anchor="middle" font-size="11" fill="#666" font-weight="bold">bit 5</text>
    <text x="630" y="60" text-anchor="middle" font-size="13" fill="#666" font-weight="bold">RSV</text>
    <text x="630" y="80" text-anchor="middle" font-size="9" fill="#666">(reserved)</text>
    <line x1="585" y1="90" x2="675" y2="90" stroke="#666" stroke-width="0.5" opacity="0.5"/>
    <text x="630" y="108" text-anchor="middle" font-size="11" fill="#666" font-weight="bold">always 0</text>
    <text x="630" y="124" text-anchor="middle" font-size="9" fill="#888">future use</text>

    <rect x="690" width="110" height="135" rx="6" fill="url(#gReserved)" opacity="0.6" stroke="#888" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="745" y="22" text-anchor="middle" font-size="11" fill="#666" font-weight="bold">bit 6</text>
    <text x="745" y="60" text-anchor="middle" font-size="13" fill="#666" font-weight="bold">RSV</text>
    <text x="745" y="80" text-anchor="middle" font-size="9" fill="#666">(reserved)</text>
    <line x1="700" y1="90" x2="790" y2="90" stroke="#666" stroke-width="0.5" opacity="0.5"/>
    <text x="745" y="108" text-anchor="middle" font-size="11" fill="#666" font-weight="bold">always 0</text>
    <text x="745" y="124" text-anchor="middle" font-size="9" fill="#888">future use</text>

    <rect x="805" width="75" height="135" rx="6" fill="url(#gReserved)" opacity="0.6" stroke="#888" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="842" y="22" text-anchor="middle" font-size="11" fill="#666" font-weight="bold">bit 7</text>
    <text x="842" y="60" text-anchor="middle" font-size="12" fill="#666" font-weight="bold">RSV</text>
    <text x="842" y="80" text-anchor="middle" font-size="9" fill="#666">(reserved)</text>
    <line x1="815" y1="90" x2="870" y2="90" stroke="#666" stroke-width="0.5" opacity="0.5"/>
    <text x="842" y="108" text-anchor="middle" font-size="10" fill="#666" font-weight="bold">always 0</text>
    <text x="842" y="124" text-anchor="middle" font-size="9" fill="#888">future use</text>
  </g>

  <!-- Brackets indicating "used" vs "reserved" -->
  <g transform="translate(40, 240)">
    <!-- Used (bits 0-2) bracket -->
    <line x1="0" y1="0" x2="340" y2="0" stroke="#d49520" stroke-width="2"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#d49520" stroke-width="2"/>
    <line x1="340" y1="-3" x2="340" y2="3" stroke="#d49520" stroke-width="2"/>
    <text x="170" y="18" text-anchor="middle" fill="#a87515" font-size="11" font-weight="bold">3 bits used (3 NodeList children)</text>

    <!-- Reserved (bits 3-7) bracket -->
    <line x1="345" y1="0" x2="880" y2="0" stroke="#888" stroke-width="2" stroke-dasharray="3,2"/>
    <line x1="345" y1="-3" x2="345" y2="3" stroke="#888" stroke-width="2"/>
    <line x1="880" y1="-3" x2="880" y2="3" stroke="#888" stroke-width="2"/>
    <text x="613" y="18" text-anchor="middle" fill="#666" font-size="11" font-weight="bold">5 bits reserved (always 0, future expansion)</text>
  </g>

  <!-- Visitor order arrow -->
  <g transform="translate(40, 285)">
    <line x1="55" y1="10" x2="285" y2="10" stroke="#666" stroke-width="1.5" marker-end="url(#ar)"/>
    <text x="170" y="28" text-anchor="middle" fill="#666" font-size="10" font-style="italic">visitor order: descriptionLines → tags → inlineTags</text>
  </g>

  <!-- ============================================================ -->
  <!-- Section 2: Concrete example                                  -->
  <!-- ============================================================ -->
  <text x="40" y="345" font-size="13" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">(2) Concrete example: <tspan font-family="monospace" fill="#7b59ac">/** Some description. @param x The id. */</tspan></text>

  <g transform="translate(40, 360)">
    <!-- byte representation -->
    <text x="0" y="14" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">Bitmask byte (binary, MSB on left):</text>

    <!-- 8 bit cells in binary order (MSB-LSB display) -->
    <g transform="translate(280, 0)">
      <text x="0" y="14" font-size="9" fill="#888">bit:</text>
      <text x="40" y="14" text-anchor="middle" font-size="9" fill="#888">7</text>
      <text x="80" y="14" text-anchor="middle" font-size="9" fill="#888">6</text>
      <text x="120" y="14" text-anchor="middle" font-size="9" fill="#888">5</text>
      <text x="160" y="14" text-anchor="middle" font-size="9" fill="#888">4</text>
      <text x="200" y="14" text-anchor="middle" font-size="9" fill="#888">3</text>
      <text x="240" y="14" text-anchor="middle" font-size="9" fill="#888">2</text>
      <text x="280" y="14" text-anchor="middle" font-size="9" fill="#888">1</text>
      <text x="320" y="14" text-anchor="middle" font-size="9" fill="#888">0</text>

      <!-- bit 7: reserved = 0 -->
      <rect x="20" y="20" width="40" height="40" fill="url(#gReserved)" opacity="0.5" stroke="#888" stroke-dasharray="3,2"/>
      <text x="40" y="45" text-anchor="middle" font-size="14" fill="#888" font-weight="bold">0</text>

      <!-- bit 6: reserved = 0 -->
      <rect x="60" y="20" width="40" height="40" fill="url(#gReserved)" opacity="0.5" stroke="#888" stroke-dasharray="3,2"/>
      <text x="80" y="45" text-anchor="middle" font-size="14" fill="#888" font-weight="bold">0</text>

      <!-- bit 5: reserved = 0 -->
      <rect x="100" y="20" width="40" height="40" fill="url(#gReserved)" opacity="0.5" stroke="#888" stroke-dasharray="3,2"/>
      <text x="120" y="45" text-anchor="middle" font-size="14" fill="#888" font-weight="bold">0</text>

      <!-- bit 4: reserved = 0 -->
      <rect x="140" y="20" width="40" height="40" fill="url(#gReserved)" opacity="0.5" stroke="#888" stroke-dasharray="3,2"/>
      <text x="160" y="45" text-anchor="middle" font-size="14" fill="#888" font-weight="bold">0</text>

      <!-- bit 3: reserved = 0 -->
      <rect x="180" y="20" width="40" height="40" fill="url(#gReserved)" opacity="0.5" stroke="#888" stroke-dasharray="3,2"/>
      <text x="200" y="45" text-anchor="middle" font-size="14" fill="#888" font-weight="bold">0</text>

      <!-- bit 2: inlineTags = 0 (no inline tags in this example) -->
      <rect x="220" y="20" width="40" height="40" fill="#eee" stroke="#bbb"/>
      <text x="240" y="45" text-anchor="middle" font-size="14" fill="#888" font-weight="bold">0</text>

      <!-- bit 1: tags = 1 (has @param tag) -->
      <rect x="260" y="20" width="40" height="40" fill="url(#gNL)" opacity="0.85" stroke="#d49520"/>
      <text x="280" y="45" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">1</text>

      <!-- bit 0: descriptionLines = 1 (has "Some description." line) -->
      <rect x="300" y="20" width="40" height="40" fill="url(#gNL)" opacity="0.85" stroke="#d49520"/>
      <text x="320" y="45" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">1</text>
    </g>

    <!-- Hex representation -->
    <text x="660" y="50" font-size="13" fill="#444" font-family="-apple-system, system-ui, sans-serif">= <tspan font-family="monospace" font-weight="bold">0b00000011</tspan></text>
    <text x="660" y="68" font-size="13" fill="#444" font-family="-apple-system, system-ui, sans-serif">= <tspan font-family="monospace" font-weight="bold">0x03</tspan></text>
  </g>

  <!-- Tree representation -->
  <g transform="translate(40, 446)">
    <text x="0" y="14" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">Resulting child layout in node tree (visitor order, only bits = 1 are emitted):</text>

    <text x="0" y="40" font-size="11" fill="#7b59ac" font-family="monospace" font-weight="bold">JsdocBlock (parent)</text>
    <text x="20" y="58" font-size="10" font-family="monospace" fill="#d49520">├── descriptionLines NodeList = [JsdocDescriptionLine "Some description."]</text>
    <text x="20" y="74" font-size="10" font-family="monospace" fill="#d49520">└── tags NodeList = [JsdocTag "@param x The id."]</text>
    <text x="20" y="92" font-size="10" font-family="monospace" fill="#bbb">    (inlineTags omitted ← bit 2 = 0, empty array — Option A2 optimization)</text>
  </g>

  <!-- ============================================================ -->
  <!-- Section 3: Notes                                             -->
  <!-- ============================================================ -->
  <g transform="translate(40, 555)">
    <rect width="840" height="100" rx="6" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="15" y="22" font-size="12" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">Bitmask interpretation rules</text>

    <text x="15" y="46" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan fill="#d49520" font-weight="bold">All 3 children are NodeList type</tspan>: 1 = NodeList emitted, 0 = empty array (NodeList skipped, "Option A2" optimization)</text>
    <text x="15" y="64" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan font-weight="bold">DFS pre-order</tspan>: descriptionLines → tags → inlineTags (bit 0 first, bit 2 last)</text>
    <text x="15" y="82" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan fill="#666" font-weight="bold">bits 3-7 (RSV)</tspan>: <tspan font-weight="bold">always 0</tspan> — reserved for future child types (e.g., footer NodeList, metadata NodeList)</text>
  </g>
</svg>
