<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" font-family="monospace" font-size="13">
  <defs>
    <linearGradient id="gOk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#50b86c"/>
      <stop offset="100%" stop-color="#3da558"/>
    </linearGradient>
    <linearGradient id="gBad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d95050"/>
      <stop offset="100%" stop-color="#c43e3e"/>
    </linearGradient>
    <linearGradient id="gU16" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5fc4d3"/>
      <stop offset="100%" stop-color="#38b6c8"/>
    </linearGradient>
    <linearGradient id="gU32" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a838"/>
      <stop offset="100%" stop-color="#d49520"/>
    </linearGradient>
    <linearGradient id="gU8" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8e6cbf"/>
      <stop offset="100%" stop-color="#7b59ac"/>
    </linearGradient>
    <linearGradient id="gStr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#50b86c"/>
      <stop offset="100%" stop-color="#3da558"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#555"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#c43e3e"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#3da558"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222" font-family="-apple-system, system-ui, sans-serif">Extended Data Alignment &amp; Padding</text>
  <text x="460" y="50" text-anchor="middle" font-size="11" fill="#666" font-family="-apple-system, system-ui, sans-serif">Multi-byte fields must start on aligned boundaries — encoder inserts padding bytes (zero-fill) as needed</text>

  <!-- ============================================================ -->
  <!-- Section 1: Alignment rules per type                          -->
  <!-- ============================================================ -->
  <text x="40" y="82" font-size="13" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">(1) Alignment rules per field type</text>

  <g transform="translate(40, 95)">
    <!-- u8 -->
    <rect width="200" height="80" rx="6" fill="url(#gU8)" opacity="0.18" stroke="#7b59ac" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b59ac">u8 (1 byte)</text>
    <text x="100" y="42" text-anchor="middle" font-size="11" fill="#7b59ac">Any byte boundary</text>
    <text x="100" y="60" text-anchor="middle" font-size="10" fill="#666" font-style="italic">offset % 1 == 0 (always)</text>
    <text x="100" y="74" text-anchor="middle" font-size="10" fill="#666" font-style="italic">No constraint</text>

    <!-- u16 -->
    <rect x="215" width="200" height="80" rx="6" fill="url(#gU16)" opacity="0.18" stroke="#2a8d9c" stroke-width="1.5"/>
    <text x="315" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a8d9c">u16 (2 bytes)</text>
    <text x="315" y="42" text-anchor="middle" font-size="11" fill="#2a8d9c">2-byte boundary</text>
    <text x="315" y="60" text-anchor="middle" font-size="10" fill="#666" font-style="italic">offset % 2 == 0</text>
    <text x="315" y="74" text-anchor="middle" font-size="10" fill="#666" font-style="italic">DataView.getUint16</text>

    <!-- u32 -->
    <rect x="430" width="200" height="80" rx="6" fill="url(#gU32)" opacity="0.18" stroke="#d49520" stroke-width="1.5"/>
    <text x="530" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#d49520">u32 (4 bytes)</text>
    <text x="530" y="42" text-anchor="middle" font-size="11" fill="#d49520">4-byte boundary</text>
    <text x="530" y="60" text-anchor="middle" font-size="10" fill="#666" font-style="italic">offset % 4 == 0</text>
    <text x="530" y="74" text-anchor="middle" font-size="10" fill="#666" font-style="italic">DataView.getUint32</text>

    <!-- StringField (6 bytes, byte-level reads, no native alignment) -->
    <rect x="645" width="195" height="80" rx="6" fill="url(#gStr)" opacity="0.18" stroke="#3da558" stroke-width="1.5"/>
    <text x="742" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#3da558">StringField (6 bytes)</text>
    <text x="742" y="42" text-anchor="middle" font-size="11" fill="#3da558">No native alignment</text>
    <text x="742" y="60" text-anchor="middle" font-size="10" fill="#666" font-style="italic">offset:u32 (LE) + length:u16</text>
    <text x="742" y="74" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Read via from_le_bytes</text>
  </g>

  <!-- ============================================================ -->
  <!-- Section 2: Padding insertion concept (Bad vs Good)           -->
  <!-- ============================================================ -->
  <text x="40" y="220" font-size="13" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">(2) How padding is inserted: misaligned (❌) vs. padded (✓)</text>

  <!-- BAD: without padding -->
  <g transform="translate(40, 240)">
    <text x="0" y="14" font-size="11" font-weight="bold" fill="#c43e3e" font-family="-apple-system, system-ui, sans-serif">❌ WITHOUT padding (misaligned u32)</text>

    <!-- byte ruler -->
    <text x="20" y="35" text-anchor="middle" font-size="9" fill="#888">0</text>
    <text x="60" y="35" text-anchor="middle" font-size="9" fill="#888">1</text>
    <text x="100" y="35" text-anchor="middle" font-size="9" fill="#888">2</text>
    <text x="140" y="35" text-anchor="middle" font-size="9" fill="#888">3</text>
    <text x="180" y="35" text-anchor="middle" font-size="9" fill="#888">4</text>
    <text x="220" y="35" text-anchor="middle" font-size="9" fill="#888">5</text>
    <text x="260" y="35" text-anchor="middle" font-size="9" fill="#888">6</text>
    <text x="300" y="35" text-anchor="middle" font-size="9" fill="#888">7</text>

    <!-- cells -->
    <!-- byte 0: u8 -->
    <rect x="0" y="40" width="40" height="40" rx="3" fill="url(#gU8)" opacity="0.85" stroke="#7b59ac"/>
    <text x="20" y="65" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">u8</text>
    <!-- byte 1: u8 -->
    <rect x="40" y="40" width="40" height="40" rx="3" fill="url(#gU8)" opacity="0.7" stroke="#7b59ac"/>
    <text x="60" y="65" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">u8</text>
    <!-- byte 2-5: u32 (misaligned!) -->
    <rect x="80" y="40" width="160" height="40" rx="3" fill="url(#gBad)" opacity="0.7" stroke="#c43e3e" stroke-width="2"/>
    <text x="160" y="58" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">u32 (4 bytes)</text>
    <text x="160" y="73" text-anchor="middle" font-size="8" fill="#fce8e8">starts at byte 2 — MISALIGNED ❌</text>

    <!-- 4-byte boundary marker -->
    <line x1="160" y1="20" x2="160" y2="100" stroke="#3da558" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="172" y="100" font-size="9" fill="#3da558" font-style="italic">↑ 4-byte boundary (byte 4)</text>

    <!-- Annotation -->
    <text x="0" y="118" font-size="10" fill="#c43e3e" font-family="-apple-system, system-ui, sans-serif">u32 starts at byte 2 → not divisible by 4</text>
    <text x="0" y="132" font-size="10" fill="#c43e3e" font-family="-apple-system, system-ui, sans-serif">→ <tspan font-weight="bold">DataView.getUint32 throws RangeError</tspan></text>
  </g>

  <!-- GOOD: with padding -->
  <g transform="translate(440, 240)">
    <text x="0" y="14" font-size="11" font-weight="bold" fill="#3da558" font-family="-apple-system, system-ui, sans-serif">✓ WITH padding (aligned u32)</text>

    <!-- byte ruler -->
    <text x="20" y="35" text-anchor="middle" font-size="9" fill="#888">0</text>
    <text x="60" y="35" text-anchor="middle" font-size="9" fill="#888">1</text>
    <text x="100" y="35" text-anchor="middle" font-size="9" fill="#888">2</text>
    <text x="140" y="35" text-anchor="middle" font-size="9" fill="#888">3</text>
    <text x="180" y="35" text-anchor="middle" font-size="9" fill="#888">4</text>
    <text x="220" y="35" text-anchor="middle" font-size="9" fill="#888">5</text>
    <text x="260" y="35" text-anchor="middle" font-size="9" fill="#888">6</text>
    <text x="300" y="35" text-anchor="middle" font-size="9" fill="#888">7</text>

    <!-- cells -->
    <!-- byte 0: u8 -->
    <rect x="0" y="40" width="40" height="40" rx="3" fill="url(#gU8)" opacity="0.85" stroke="#7b59ac"/>
    <text x="20" y="65" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">u8</text>
    <!-- byte 1: u8 -->
    <rect x="40" y="40" width="40" height="40" rx="3" fill="url(#gU8)" opacity="0.7" stroke="#7b59ac"/>
    <text x="60" y="65" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">u8</text>
    <!-- byte 2-3: padding -->
    <rect x="80" y="40" width="80" height="40" rx="3" fill="#bbb" opacity="0.5" stroke="#888" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="120" y="58" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">pad</text>
    <text x="120" y="73" text-anchor="middle" font-size="9" fill="#444">2 bytes</text>
    <!-- byte 4-7: u32 (aligned) -->
    <rect x="160" y="40" width="160" height="40" rx="3" fill="url(#gOk)" opacity="0.85" stroke="#3da558" stroke-width="2"/>
    <text x="240" y="58" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">u32 (4 bytes)</text>
    <text x="240" y="73" text-anchor="middle" font-size="9" fill="#e8f5ec">starts at byte 4 ✓</text>

    <!-- 4-byte boundary marker -->
    <line x1="160" y1="20" x2="160" y2="100" stroke="#3da558" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="172" y="100" font-size="9" fill="#3da558" font-style="italic">↑ 4-byte boundary</text>

    <!-- Annotation -->
    <text x="0" y="125" font-size="10" fill="#2d8b48" font-family="-apple-system, system-ui, sans-serif">2 padding bytes inserted → u32 aligns to byte 4 → <tspan font-weight="bold">safe and fast</tspan></text>
  </g>

  <!-- ============================================================ -->
  <!-- Section 3: Concrete example - JsdocBlock compat (basic 68 + compat 22 = 90 bytes) -->
  <!-- ============================================================ -->
  <text x="40" y="410" font-size="13" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">(3) Concrete example: <tspan font-family="monospace" fill="#7b59ac">JsdocBlock</tspan> Extended Data padding (3 padding insertions, 90 bytes total — incl. 18B list metadata)</text>

  <!-- 1 byte = 9.2 px → 90 byte ≈ 828 px (full compat layout fits) -->
  <g transform="translate(40, 425)">
    <!-- Key 4-byte / 8-byte boundary lines -->
    <line x1="0"   y1="0" x2="0"   y2="80" stroke="#3da558" stroke-width="1" stroke-dasharray="2,1" opacity="0.4"/>
    <line x1="74"  y1="0" x2="74"  y2="80" stroke="#3da558" stroke-width="1" stroke-dasharray="2,1" opacity="0.4"/>
    <line x1="220" y1="0" x2="220" y2="80" stroke="#3da558" stroke-width="1" stroke-dasharray="2,1" opacity="0.4"/>
    <line x1="368" y1="0" x2="368" y2="80" stroke="#3da558" stroke-width="1" stroke-dasharray="2,1" opacity="0.4"/>
    <line x1="460" y1="0" x2="460" y2="80" stroke="#3da558" stroke-width="2" stroke-dasharray="2,2" opacity="0.6"/>
    <line x1="625.6" y1="0" x2="625.6" y2="80" stroke="#3da558" stroke-width="2" stroke-dasharray="2,2" opacity="0.6"/>
    <line x1="644"  y1="0" x2="644"  y2="80" stroke="#3da558" stroke-width="2" stroke-dasharray="2,2" opacity="0.6"/>
    <line x1="681"  y1="0" x2="681"  y2="80" stroke="#3da558" stroke-width="1" stroke-dasharray="2,1" opacity="0.4"/>
    <line x1="791"  y1="0" x2="791"  y2="80" stroke="#3da558" stroke-width="2" stroke-dasharray="2,2" opacity="0.6"/>
    <line x1="828"  y1="0" x2="828"  y2="80" stroke="#3da558" stroke-width="2" stroke-dasharray="2,2" opacity="0.6"/>

    <!-- Selected byte boundary labels (top) -->
    <text x="0" y="-3" text-anchor="middle" font-size="8" fill="#3da558">0</text>
    <text x="74" y="-3" text-anchor="middle" font-size="8" fill="#3da558">8</text>
    <text x="220" y="-3" text-anchor="middle" font-size="8" fill="#3da558">24</text>
    <text x="368" y="-3" text-anchor="middle" font-size="8" fill="#3da558">40</text>
    <text x="460" y="-3" text-anchor="middle" font-size="8" fill="#3da558">50</text>
    <text x="625.6" y="-3" text-anchor="middle" font-size="8" fill="#3da558">68</text>
    <text x="644" y="-3" text-anchor="middle" font-size="8" fill="#3da558">70</text>
    <text x="791" y="-3" text-anchor="middle" font-size="8" fill="#3da558">86</text>
    <text x="828" y="-3" text-anchor="middle" font-size="8" fill="#3da558">90</text>

    <!-- Cells (1 byte ≈ 9.2 px) -->
    <!-- byte 0: bitmask (u8) — 9.2 px -->
    <rect x="0" y="10" width="9.2" height="40" fill="url(#gU8)" opacity="0.85" stroke="#7b59ac"/>
    <text x="4.6" y="33" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">B</text>

    <!-- byte 1: padding (u8) — 9.2 px -->
    <rect x="9.2" y="10" width="9.2" height="40" fill="#bbb" opacity="0.6" stroke="#666" stroke-width="1" stroke-dasharray="2,1"/>
    <text x="13.8" y="33" text-anchor="middle" font-size="7" fill="#444" font-weight="bold">P</text>

    <!-- byte 2-49: 8 × StringField — 8 × 55.2 px = 441.6 px -->
    <rect x="18.4" y="10" width="441.6" height="40" fill="url(#gStr)" opacity="0.45" stroke="#3da558"/>
    <text x="239" y="29" text-anchor="middle" font-size="11" fill="#3da558" font-weight="bold">8 StringFields (description + 7 delimiters)</text>
    <text x="239" y="43" text-anchor="middle" font-size="9" fill="#3da558">8 × 6 bytes = 48 bytes (bytes 2-49)</text>

    <!-- byte 50-67: 3 × list metadata (head:u32 + count:u16 = 6B each) — 3 × 55.2 = 165.6 px -->
    <rect x="460" y="10" width="165.6" height="40" fill="url(#gOk)" opacity="0.45" stroke="#3da558" stroke-width="1.5"/>
    <text x="542.8" y="29" text-anchor="middle" font-size="10" fill="#2d8b48" font-weight="bold">3 × list metadata (head:u32 + count:u16)</text>
    <text x="542.8" y="43" text-anchor="middle" font-size="9" fill="#2d8b48">descLines / tags / inlineTags — 3 × 6 = 18 bytes (bytes 50-67)</text>

    <!-- basic ends at byte 68 -->
    <line x1="625.6" y1="0" x2="625.6" y2="60" stroke="#666" stroke-width="2"/>
    <text x="625.6" y="74" text-anchor="middle" font-size="8" fill="#666" font-style="italic">basic ends (byte 68)</text>

    <!-- byte 68-69: padding (u16) — 18.4 px -->
    <rect x="625.6" y="10" width="18.4" height="40" fill="#bbb" opacity="0.6" stroke="#666" stroke-width="1" stroke-dasharray="2,1"/>
    <text x="634.8" y="33" text-anchor="middle" font-size="7" fill="#444" font-weight="bold">P</text>

    <!-- byte 70-73: end_line (u32) — 36.8 px -->
    <rect x="644" y="10" width="36.8" height="40" fill="url(#gU32)" opacity="0.85" stroke="#d49520"/>
    <text x="662.4" y="29" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">end_line</text>
    <text x="662.4" y="42" text-anchor="middle" font-size="7" fill="#fff5e0">u32</text>

    <!-- byte 74-85: 3 × u32 line indices — 3 × 36.8 = 110.4 px -->
    <rect x="680.8" y="10" width="110.4" height="40" fill="url(#gU32)" opacity="0.65" stroke="#d49520"/>
    <text x="736" y="29" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">3 line indices</text>
    <text x="736" y="42" text-anchor="middle" font-size="7" fill="#fff5e0">u32 × 3</text>

    <!-- byte 86: Hp (u8) — 9.2 px -->
    <rect x="791.2" y="10" width="9.2" height="40" fill="url(#gBad)" opacity="0.7" stroke="#c43e3e"/>
    <text x="795.8" y="33" text-anchor="middle" font-size="6" fill="#fff" font-weight="bold">Hp</text>

    <!-- byte 87: Hpt (u8) — 9.2 px -->
    <rect x="800.4" y="10" width="9.2" height="40" fill="url(#gBad)" opacity="0.6" stroke="#c43e3e"/>
    <text x="805" y="33" text-anchor="middle" font-size="6" fill="#fff" font-weight="bold">Hpt</text>

    <!-- byte 88-89: trailing padding (u16) — 18.4 px -->
    <rect x="809.6" y="10" width="18.4" height="40" fill="#bbb" opacity="0.6" stroke="#666" stroke-width="1" stroke-dasharray="2,1"/>
    <text x="818.8" y="33" text-anchor="middle" font-size="7" fill="#444" font-weight="bold">P</text>

    <!-- compat ends at byte 90 -->
    <line x1="828" y1="0" x2="828" y2="60" stroke="#666" stroke-width="2"/>
    <text x="828" y="74" text-anchor="middle" font-size="8" fill="#666" font-style="italic">compat ends (byte 90)</text>
  </g>

  <!-- Padding annotations (under the cells) -->
  <g transform="translate(40, 525)">
    <!-- Padding 1 (byte 1, StringField alignment) -->
    <line x1="13.8" y1="0" x2="13.8" y2="20" stroke="#666" stroke-width="1" stroke-dasharray="2,1"/>
    <line x1="13.8" y1="20" x2="120" y2="20" stroke="#666" stroke-width="1"/>
    <text x="125" y="24" font-size="10" fill="#444" font-family="-apple-system, system-ui, sans-serif">① byte 1 (u8 pad) → places first <tspan font-weight="bold" fill="#3da558">StringField (description)</tspan> at byte 2</text>

    <!-- Padding 2 (bytes 68-69, u32 alignment) -->
    <line x1="634.8" y1="0" x2="634.8" y2="40" stroke="#666" stroke-width="1" stroke-dasharray="2,1"/>
    <line x1="634.8" y1="40" x2="700" y2="40" stroke="#666" stroke-width="1"/>
    <text x="350" y="44" font-size="10" fill="#444" font-family="-apple-system, system-ui, sans-serif">② bytes 68-69 (u16 pad) → aligns first compat <tspan font-weight="bold" fill="#d49520">u32 (end_line)</tspan> at byte 70</text>

    <!-- Padding 3 (bytes 88-89, trailing) -->
    <line x1="818.8" y1="0" x2="818.8" y2="60" stroke="#666" stroke-width="1" stroke-dasharray="2,1"/>
    <line x1="200" y1="60" x2="818.8" y2="60" stroke="#666" stroke-width="1"/>
    <text x="0" y="64" font-size="10" fill="#444" font-family="-apple-system, system-ui, sans-serif">③ bytes 88-89 (u16 pad) → trailing alignment (next Extended Data record may start at u32 boundary)</text>
  </g>

  <!-- ============================================================ -->
  <!-- Section 4: Notes                                             -->
  <!-- ============================================================ -->
  <g transform="translate(40, 615)">
    <rect width="840" height="100" rx="6" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="15" y="22" font-size="12" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">Padding rules summary</text>
    <text x="15" y="44" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• Encoder inserts <tspan font-weight="bold">zero-fill bytes</tspan> before each multi-byte field if its current offset is misaligned</text>
    <text x="15" y="62" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• Padding bytes are <tspan font-weight="bold">never decoded</tspan> — they exist only to satisfy boundary requirements</text>
    <text x="15" y="80" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan font-weight="bold">StringField</tspan> uses byte-level reads (no native alignment), but each Extended Data <tspan font-weight="bold">record</tspan> starts on an 8-byte boundary</text>
  </g>
</svg>
