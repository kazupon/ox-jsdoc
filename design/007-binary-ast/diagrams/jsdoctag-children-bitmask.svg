<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 700" font-family="monospace" font-size="13">
  <defs>
    <linearGradient id="gReq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#50b86c"/>
      <stop offset="100%" stop-color="#3da558"/>
    </linearGradient>
    <linearGradient id="gOpt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#357abd"/>
    </linearGradient>
    <linearGradient id="gNL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a838"/>
      <stop offset="100%" stop-color="#d49520"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222" font-family="-apple-system, system-ui, sans-serif">JsdocTag Children Bitmask (Extended Data byte 0)</text>
  <text x="460" y="50" text-anchor="middle" font-size="11" fill="#666" font-family="-apple-system, system-ui, sans-serif">8-bit field — each bit indicates whether a child slot is emitted in the node tree (visitor order)</text>

  <!-- ============================================================ -->
  <!-- Section 1: 8-bit cell layout                                 -->
  <!-- ============================================================ -->
  <text x="40" y="82" font-size="13" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">(1) Bit layout (8 bits, visitor order: bit 0 first)</text>

  <g transform="translate(40, 95)">
    <!-- bit 0: tag (Required, always 1) -->
    <rect width="110" height="135" rx="6" fill="url(#gReq)" opacity="0.85" stroke="#3da558" stroke-width="2"/>
    <text x="55" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">bit 0</text>
    <text x="55" y="55" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">tag</text>
    <text x="55" y="74" text-anchor="middle" font-size="9" fill="#e8f5ec">JsdocTagName</text>
    <line x1="10" y1="85" x2="100" y2="85" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
    <text x="55" y="105" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">★ Required</text>
    <text x="55" y="122" text-anchor="middle" font-size="9" fill="#e8f5ec">(always 1)</text>

    <!-- bit 1: rawType (Optional) -->
    <rect x="115" width="110" height="135" rx="6" fill="url(#gOpt)" opacity="0.85" stroke="#357abd" stroke-width="1.5"/>
    <text x="170" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">bit 1</text>
    <text x="170" y="55" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">rawType</text>
    <text x="170" y="74" text-anchor="middle" font-size="9" fill="#e6f0fa">JsdocTypeSource</text>
    <line x1="125" y1="85" x2="215" y2="85" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
    <text x="170" y="105" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Option</text>
    <text x="170" y="122" text-anchor="middle" font-size="9" fill="#e6f0fa">(0 or 1)</text>

    <!-- bit 2: name (Optional) -->
    <rect x="230" width="110" height="135" rx="6" fill="url(#gOpt)" opacity="0.85" stroke="#357abd" stroke-width="1.5"/>
    <text x="285" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">bit 2</text>
    <text x="285" y="55" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">name</text>
    <text x="285" y="74" text-anchor="middle" font-size="9" fill="#e6f0fa">JsdocTagNameValue</text>
    <line x1="240" y1="85" x2="330" y2="85" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
    <text x="285" y="105" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Option</text>
    <text x="285" y="122" text-anchor="middle" font-size="9" fill="#e6f0fa">(0 or 1)</text>

    <!-- bit 3: parsedType (Optional) -->
    <rect x="345" width="110" height="135" rx="6" fill="url(#gOpt)" opacity="0.85" stroke="#357abd" stroke-width="1.5"/>
    <text x="400" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">bit 3</text>
    <text x="400" y="55" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">parsedType</text>
    <text x="400" y="74" text-anchor="middle" font-size="9" fill="#e6f0fa">TypeNode</text>
    <line x1="355" y1="85" x2="445" y2="85" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
    <text x="400" y="105" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Option</text>
    <text x="400" y="122" text-anchor="middle" font-size="9" fill="#e6f0fa">(0 or 1)</text>

    <!-- bit 4: body (Optional) -->
    <rect x="460" width="110" height="135" rx="6" fill="url(#gOpt)" opacity="0.85" stroke="#357abd" stroke-width="1.5"/>
    <text x="515" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">bit 4</text>
    <text x="515" y="55" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">body</text>
    <text x="515" y="74" text-anchor="middle" font-size="9" fill="#e6f0fa">JsdocTagBody</text>
    <line x1="470" y1="85" x2="560" y2="85" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
    <text x="515" y="105" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Option</text>
    <text x="515" y="122" text-anchor="middle" font-size="9" fill="#e6f0fa">(0 or 1)</text>

    <!-- bit 5: typeLines NodeList -->
    <rect x="575" width="110" height="135" rx="6" fill="url(#gNL)" opacity="0.85" stroke="#d49520" stroke-width="1.5"/>
    <text x="630" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">bit 5</text>
    <text x="630" y="55" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">typeLines</text>
    <text x="630" y="74" text-anchor="middle" font-size="9" fill="#fff5e0">JsdocTypeLine[]</text>
    <line x1="585" y1="85" x2="675" y2="85" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
    <text x="630" y="105" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">NodeList</text>
    <text x="630" y="122" text-anchor="middle" font-size="9" fill="#fff5e0">(skip if empty)</text>

    <!-- bit 6: descriptionLines NodeList -->
    <rect x="690" width="110" height="135" rx="6" fill="url(#gNL)" opacity="0.85" stroke="#d49520" stroke-width="1.5"/>
    <text x="745" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">bit 6</text>
    <text x="745" y="50" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">description-</text>
    <text x="745" y="64" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Lines</text>
    <text x="745" y="78" text-anchor="middle" font-size="9" fill="#fff5e0">JsdocDesc...[]</text>
    <line x1="700" y1="88" x2="790" y2="88" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
    <text x="745" y="107" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">NodeList</text>
    <text x="745" y="123" text-anchor="middle" font-size="9" fill="#fff5e0">(skip if empty)</text>

    <!-- bit 7: inlineTags NodeList -->
    <rect x="805" width="75" height="135" rx="6" fill="url(#gNL)" opacity="0.85" stroke="#d49520" stroke-width="1.5"/>
    <text x="842" y="22" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">bit 7</text>
    <text x="842" y="48" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">inline-</text>
    <text x="842" y="62" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Tags</text>
    <text x="842" y="78" text-anchor="middle" font-size="8" fill="#fff5e0">JsdocInline...[]</text>
    <line x1="815" y1="88" x2="870" y2="88" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
    <text x="842" y="107" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">NodeList</text>
    <text x="842" y="123" text-anchor="middle" font-size="8" fill="#fff5e0">(skip empty)</text>
  </g>

  <!-- Visitor order arrow -->
  <g transform="translate(40, 245)">
    <line x1="55" y1="10" x2="842" y2="10" stroke="#666" stroke-width="1.5" marker-end="url(#ar)"/>
    <text x="450" y="28" text-anchor="middle" fill="#666" font-size="10" font-style="italic">visitor order (DFS pre-order): bit 0 first → bit 7 last</text>
  </g>

  <!-- ============================================================ -->
  <!-- Section 2: Concrete byte example with binary representation -->
  <!-- ============================================================ -->
  <text x="40" y="305" font-size="13" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">(2) Concrete example: <tspan font-family="monospace" fill="#7b59ac">@param {string} id - User ID</tspan></text>

  <g transform="translate(40, 320)">
    <!-- byte representation -->
    <text x="0" y="14" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">Bitmask byte (binary, MSB on left):</text>

    <!-- 8 bit cells in binary order (MSB-LSB display) -->
    <g transform="translate(280, 0)">
      <text x="0" y="14" font-size="9" fill="#888">bit:</text>
      <text x="40" y="14" text-anchor="middle" font-size="9" fill="#888">7</text>
      <text x="80" y="14" text-anchor="middle" font-size="9" fill="#888">6</text>
      <text x="120" y="14" text-anchor="middle" font-size="9" fill="#888">5</text>
      <text x="160" y="14" text-anchor="middle" font-size="9" fill="#888">4</text>
      <text x="200" y="14" text-anchor="middle" font-size="9" fill="#888">3</text>
      <text x="240" y="14" text-anchor="middle" font-size="9" fill="#888">2</text>
      <text x="280" y="14" text-anchor="middle" font-size="9" fill="#888">1</text>
      <text x="320" y="14" text-anchor="middle" font-size="9" fill="#888">0</text>

      <!-- bit 7: inlineTags = 0 (no inline tags) -->
      <rect x="20" y="20" width="40" height="40" fill="#eee" stroke="#bbb"/>
      <text x="40" y="45" text-anchor="middle" font-size="14" fill="#888" font-weight="bold">0</text>

      <!-- bit 6: descriptionLines = 0 (single line description, no NodeList) -->
      <rect x="60" y="20" width="40" height="40" fill="#eee" stroke="#bbb"/>
      <text x="80" y="45" text-anchor="middle" font-size="14" fill="#888" font-weight="bold">0</text>

      <!-- bit 5: typeLines = 0 (single line type, no NodeList) -->
      <rect x="100" y="20" width="40" height="40" fill="#eee" stroke="#bbb"/>
      <text x="120" y="45" text-anchor="middle" font-size="14" fill="#888" font-weight="bold">0</text>

      <!-- bit 4: body = 0 (no body in compact form) -->
      <rect x="140" y="20" width="40" height="40" fill="#eee" stroke="#bbb"/>
      <text x="160" y="45" text-anchor="middle" font-size="14" fill="#888" font-weight="bold">0</text>

      <!-- bit 3: parsedType = 1 (has {string}) -->
      <rect x="180" y="20" width="40" height="40" fill="url(#gOpt)" opacity="0.85" stroke="#357abd"/>
      <text x="200" y="45" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">1</text>

      <!-- bit 2: name = 1 (has 'id') -->
      <rect x="220" y="20" width="40" height="40" fill="url(#gOpt)" opacity="0.85" stroke="#357abd"/>
      <text x="240" y="45" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">1</text>

      <!-- bit 1: rawType = 1 (raw '{string}' text) -->
      <rect x="260" y="20" width="40" height="40" fill="url(#gOpt)" opacity="0.85" stroke="#357abd"/>
      <text x="280" y="45" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">1</text>

      <!-- bit 0: tag = 1 (always 'param') -->
      <rect x="300" y="20" width="40" height="40" fill="url(#gReq)" opacity="0.85" stroke="#3da558" stroke-width="2"/>
      <text x="320" y="45" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">1</text>
    </g>

    <!-- Hex representation -->
    <text x="660" y="50" font-size="13" fill="#444" font-family="-apple-system, system-ui, sans-serif">= <tspan font-family="monospace" font-weight="bold">0b00001111</tspan></text>
    <text x="660" y="68" font-size="13" fill="#444" font-family="-apple-system, system-ui, sans-serif">= <tspan font-family="monospace" font-weight="bold">0x0F</tspan></text>
  </g>

  <!-- Tree representation -->
  <g transform="translate(40, 408)">
    <text x="0" y="14" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">Resulting child layout in node tree (visitor order, only bits = 1 are emitted):</text>

    <text x="0" y="40" font-size="11" fill="#7b59ac" font-family="monospace" font-weight="bold">JsdocTag (parent)</text>
    <text x="20" y="58" font-size="10" font-family="monospace" fill="#3da558">├── tag = JsdocTagName "param"</text>
    <text x="20" y="74" font-size="10" font-family="monospace" fill="#357abd">├── rawType = JsdocTypeSource "string"</text>
    <text x="20" y="90" font-size="10" font-family="monospace" fill="#357abd">├── name = JsdocTagNameValue "id"</text>
    <text x="20" y="106" font-size="10" font-family="monospace" fill="#357abd">└── parsedType = TypeName "string"</text>
    <text x="20" y="124" font-size="10" font-family="monospace" fill="#bbb">    (body, typeLines, descriptionLines, inlineTags omitted ← bits = 0)</text>
  </g>

  <!-- ============================================================ -->
  <!-- Section 3: Notes                                             -->
  <!-- ============================================================ -->
  <g transform="translate(40, 545)">
    <rect width="840" height="145" rx="6" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="15" y="22" font-size="12" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">Bitmask interpretation rules</text>

    <text x="15" y="46" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan fill="#3da558" font-weight="bold">bit 0 (tag)</tspan>: <tspan font-weight="bold">always 1</tspan> — tag is required, never absent (still occupies a bit for uniformity)</text>
    <text x="15" y="64" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan fill="#357abd" font-weight="bold">bits 1-4 (Option fields)</tspan>: 1 = Some (child emitted), 0 = None (child absent)</text>
    <text x="15" y="82" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan fill="#d49520" font-weight="bold">bits 5-7 (NodeList fields)</tspan>: 1 = NodeList emitted, 0 = empty array (NodeList skipped, "Option A2" optimization)</text>
    <text x="15" y="100" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan font-weight="bold">DFS pre-order</tspan>: child nodes appear in the node tree in bit-position order (bit 0 first, bit 7 last)</text>
    <text x="15" y="118" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• Decoder: <tspan font-family="monospace">if (mask &amp; (1 &lt;&lt; bitN)) {{ /* read child N */ }}</tspan> — sequential walk via parent/sibling indices</text>
    <text x="15" y="136" font-size="10" fill="#666" font-family="-apple-system, system-ui, sans-serif" font-style="italic">Why Extended Data byte 0 (not Node Data)? — JsdocTag uses Extended type (0b10) Node Data, whose payload is the offset, not a bitmask</text>
  </g>
</svg>
