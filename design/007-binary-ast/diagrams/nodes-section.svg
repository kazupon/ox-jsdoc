<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 800" font-family="monospace" font-size="13">
  <defs>
    <linearGradient id="gNd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8e6cbf"/>
      <stop offset="100%" stop-color="#7b59ac"/>
    </linearGradient>
    <linearGradient id="gNdLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b9a3d6"/>
      <stop offset="100%" stop-color="#9d83c0"/>
    </linearGradient>
    <linearGradient id="gKind" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fc4d3"/>
      <stop offset="100%" stop-color="#38b6c8"/>
    </linearGradient>
    <linearGradient id="gPos" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#50b86c"/>
      <stop offset="100%" stop-color="#3da558"/>
    </linearGradient>
    <linearGradient id="gNodeData" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a838"/>
      <stop offset="100%" stop-color="#d49520"/>
    </linearGradient>
    <linearGradient id="gLink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d95050"/>
      <stop offset="100%" stop-color="#c43e3e"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#555"/>
    </marker>
    <marker id="ar-purple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#7b59ac"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#c43e3e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#222" font-family="-apple-system, system-ui, sans-serif">Nodes Section (24 bytes/node, flat array, source order)</text>
  <text x="460" y="50" text-anchor="middle" font-size="11" fill="#666" font-family="-apple-system, system-ui, sans-serif">Flat array of fixed-size node records — tree structure reconstructed via parent + next_sibling indices</text>

  <!-- ============================================================ -->
  <!-- Section 1: Section overview (sequential flat array)          -->
  <!-- ============================================================ -->
  <text x="40" y="82" font-size="13" font-weight="bold" fill="#7b59ac" font-family="-apple-system, system-ui, sans-serif">(1) Layout: flat array of node records (DFS pre-order, 24 bytes each)</text>

  <g transform="translate(40, 95)">
    <!-- node[0] sentinel -->
    <rect width="120" height="70" rx="6" fill="#bbb" opacity="0.5" stroke="#888" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="60" y="22" text-anchor="middle" fill="#444" font-size="12" font-weight="bold">node[0]</text>
    <text x="60" y="40" text-anchor="middle" fill="#444" font-size="11" font-weight="bold">sentinel</text>
    <text x="60" y="55" text-anchor="middle" fill="#666" font-size="9">(all zeros)</text>
    <text x="60" y="65" text-anchor="middle" fill="#666" font-size="8">node_index 0 = "no link"</text>

    <!-- node[1] root -->
    <rect x="125" width="120" height="70" rx="6" fill="url(#gNd)" opacity="0.85" stroke="#7b59ac" stroke-width="2.5"/>
    <text x="185" y="22" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">node[1]</text>
    <text x="185" y="40" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">★ root</text>
    <text x="185" y="55" text-anchor="middle" fill="#efeaf5" font-size="9">parent = 0</text>
    <text x="185" y="65" text-anchor="middle" fill="#efeaf5" font-size="7">first comment's JsdocBlock</text>

    <!-- node[2] child -->
    <rect x="250" width="120" height="70" rx="6" fill="url(#gNd)" opacity="0.7" stroke="#7b59ac" stroke-width="1.5"/>
    <text x="310" y="22" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">node[2]</text>
    <text x="310" y="40" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">child of [1]</text>
    <text x="310" y="55" text-anchor="middle" fill="#efeaf5" font-size="9">parent = 1</text>
    <text x="310" y="65" text-anchor="middle" fill="#efeaf5" font-size="8">first child = node[i+1]</text>

    <!-- node[3] descendant -->
    <rect x="375" width="120" height="70" rx="6" fill="url(#gNd)" opacity="0.85" stroke="#7b59ac" stroke-width="1.5"/>
    <text x="435" y="22" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">node[3]</text>
    <text x="435" y="40" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">descendant</text>
    <text x="435" y="55" text-anchor="middle" fill="#efeaf5" font-size="9">parent = 2</text>

    <!-- ... -->
    <text x="510" y="42" fill="#7b59ac" font-size="20" font-weight="bold">...</text>

    <!-- node[k] root[1] (batch case) -->
    <rect x="535" width="125" height="70" rx="6" fill="url(#gNd)" opacity="0.85" stroke="#7b59ac" stroke-width="2.5"/>
    <text x="597" y="22" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">node[k]</text>
    <text x="597" y="40" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">★ root[1]</text>
    <text x="597" y="55" text-anchor="middle" fill="#efeaf5" font-size="9">parent = 0</text>
    <text x="597" y="65" text-anchor="middle" fill="#efeaf5" font-size="8">2nd comment (batch)</text>

    <!-- ... -->
    <text x="680" y="42" fill="#7b59ac" font-size="20" font-weight="bold">...</text>

    <!-- node[N-1] last node -->
    <rect x="705" width="125" height="70" rx="6" fill="url(#gNd)" opacity="0.7" stroke="#7b59ac" stroke-width="1.5"/>
    <text x="767" y="22" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">node[N-1]</text>
    <text x="767" y="40" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">last node</text>
    <text x="767" y="55" text-anchor="middle" fill="#efeaf5" font-size="9">N = node count</text>
    <text x="767" y="65" text-anchor="middle" fill="#efeaf5" font-size="8">(Header byte 28-31)</text>
  </g>

  <!-- Total size annotation -->
  <text x="40" y="190" font-size="11" fill="#666" font-family="-apple-system, system-ui, sans-serif" font-style="italic">Total size: 24 × N bytes (e.g. typical N=100 → 2.4 KB; typescript-checker.ts → 10K+ nodes ≈ 240 KB)</text>
  <text x="40" y="206" font-size="11" fill="#666" font-family="-apple-system, system-ui, sans-serif" font-style="italic">Random access: node[i] is at offset (Header.nodesOffset + i × 24)</text>

  <!-- Zoom-in indicator (dotted lines from node[1] to detail) -->
  <line x1="125" y1="165" x2="40" y2="245" stroke="#7b59ac" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="245" y1="165" x2="880" y2="245" stroke="#7b59ac" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ============================================================ -->
  <!-- Section 2: Record detail (24-byte breakdown)                 -->
  <!-- ============================================================ -->
  <text x="40" y="240" font-size="13" font-weight="bold" fill="#7b59ac" font-family="-apple-system, system-ui, sans-serif">(2) Record detail: each node = 24 bytes (8 fields)</text>

  <g transform="translate(40, 255)">
    <!-- byte 0: Kind (u8) -->
    <rect x="0" y="0" width="35" height="80" rx="4" fill="url(#gKind)" opacity="0.85" stroke="#2a8d9c" stroke-width="1.5"/>
    <text x="17" y="18" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">b 0</text>
    <text x="17" y="42" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Kind</text>
    <text x="17" y="60" text-anchor="middle" fill="#e0f5f8" font-size="8">u8</text>
    <text x="17" y="68" text-anchor="middle" fill="#e0f5f8" font-size="7">node</text>
    <text x="17" y="76" text-anchor="middle" fill="#e0f5f8" font-size="7">type</text>

    <!-- byte 1: Common Data (u8) -->
    <rect x="35" y="0" width="35" height="80" rx="4" fill="url(#gKind)" opacity="0.6" stroke="#2a8d9c" stroke-width="1.5"/>
    <text x="52" y="18" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">b 1</text>
    <text x="52" y="36" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">Common</text>
    <text x="52" y="48" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">Data</text>
    <text x="52" y="60" text-anchor="middle" fill="#e0f5f8" font-size="8">u8 (6b)</text>
    <text x="52" y="70" text-anchor="middle" fill="#e0f5f8" font-size="7">flags</text>
    <text x="52" y="78" text-anchor="middle" fill="#e0f5f8" font-size="7">/enum</text>

    <!-- byte 2-3: padding (u16) -->
    <rect x="70" y="0" width="70" height="80" rx="4" fill="#bbb" opacity="0.5" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="105" y="20" text-anchor="middle" fill="#444" font-size="10" font-weight="bold">byte 2-3</text>
    <text x="105" y="46" text-anchor="middle" fill="#444" font-size="13" font-weight="bold">pad</text>
    <text x="105" y="62" text-anchor="middle" fill="#444" font-size="9">u16</text>
    <text x="105" y="74" text-anchor="middle" fill="#666" font-size="7">u32 alignment</text>

    <!-- byte 4-7: Pos (u32) -->
    <rect x="140" y="0" width="120" height="80" rx="4" fill="url(#gPos)" opacity="0.85" stroke="#3da558" stroke-width="1.5"/>
    <text x="200" y="20" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">byte 4-7</text>
    <text x="200" y="46" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Pos</text>
    <text x="200" y="62" text-anchor="middle" fill="#e8f5ec" font-size="9">u32 UTF-16</text>
    <text x="200" y="74" text-anchor="middle" fill="#e8f5ec" font-size="8">relative offset</text>

    <!-- byte 8-11: End (u32) -->
    <rect x="260" y="0" width="120" height="80" rx="4" fill="url(#gPos)" opacity="0.7" stroke="#3da558" stroke-width="1.5"/>
    <text x="320" y="20" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">byte 8-11</text>
    <text x="320" y="46" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">End</text>
    <text x="320" y="62" text-anchor="middle" fill="#e8f5ec" font-size="9">u32 UTF-16</text>
    <text x="320" y="74" text-anchor="middle" fill="#e8f5ec" font-size="8">relative offset</text>

    <!-- byte 12-15: Node Data (u32) -->
    <rect x="380" y="0" width="120" height="80" rx="4" fill="url(#gNodeData)" opacity="0.85" stroke="#d49520" stroke-width="1.5"/>
    <text x="440" y="20" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">byte 12-15</text>
    <text x="440" y="42" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Node Data</text>
    <text x="440" y="58" text-anchor="middle" fill="#fff5e0" font-size="9">u32 (2 bit tag</text>
    <text x="440" y="70" text-anchor="middle" fill="#fff5e0" font-size="9">+ 30 bit payload)</text>

    <!-- byte 16-19: Parent index (u32) -->
    <rect x="500" y="0" width="120" height="80" rx="4" fill="url(#gLink)" opacity="0.85" stroke="#c43e3e" stroke-width="1.5"/>
    <text x="560" y="20" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">byte 16-19</text>
    <text x="560" y="42" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Parent idx</text>
    <text x="560" y="58" text-anchor="middle" fill="#fce8e8" font-size="9">u32</text>
    <text x="560" y="70" text-anchor="middle" fill="#fce8e8" font-size="8">0 = root or none</text>

    <!-- byte 20-23: Next sibling index (u32) -->
    <rect x="620" y="0" width="120" height="80" rx="4" fill="url(#gLink)" opacity="0.7" stroke="#c43e3e" stroke-width="1.5"/>
    <text x="680" y="20" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">byte 20-23</text>
    <text x="680" y="42" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Next Sibling</text>
    <text x="680" y="58" text-anchor="middle" fill="#fce8e8" font-size="9">u32</text>
    <text x="680" y="70" text-anchor="middle" fill="#fce8e8" font-size="8">0 = no sibling</text>
  </g>

  <!-- ============================================================ -->
  <!-- Section 3: Tree reconstruction example                       -->
  <!-- ============================================================ -->
  <text x="40" y="365" font-size="13" font-weight="bold" fill="#7b59ac" font-family="-apple-system, system-ui, sans-serif">(3) Tree reconstruction example: <tspan font-family="monospace" fill="#444">/** @param x */</tspan></text>

  <!-- Flat array (left side) -->
  <g transform="translate(40, 385)">
    <text x="0" y="14" font-size="11" font-weight="bold" fill="#7b59ac" font-family="-apple-system, system-ui, sans-serif">Flat array (source order, DFS pre-order)</text>

    <!-- node[0] sentinel -->
    <rect x="0" y="20" width="380" height="32" rx="4" fill="#bbb" opacity="0.4" stroke="#888"/>
    <text x="190" y="40" text-anchor="middle" fill="#444" font-size="11">node[0]: sentinel (all zeros)</text>

    <!-- node[1] JsdocBlock -->
    <rect x="0" y="56" width="380" height="32" rx="4" fill="url(#gNd)" opacity="0.85" stroke="#7b59ac" stroke-width="2"/>
    <text x="10" y="76" fill="#fff" font-size="11" font-weight="bold">node[1]</text>
    <text x="80" y="76" fill="#fff" font-size="11">JsdocBlock</text>
    <text x="200" y="76" fill="#efeaf5" font-size="10">parent=0  next=0</text>

    <!-- node[2] JsdocTag (direct child of JsdocBlock; tags list metadata in block ED b 56-61 → head=2, count=1) -->
    <rect x="20" y="92" width="360" height="32" rx="4" fill="url(#gNd)" opacity="0.85" stroke="#7b59ac" stroke-width="1.5"/>
    <text x="30" y="112" fill="#fff" font-size="11" font-weight="bold">node[2]</text>
    <text x="100" y="112" fill="#fff" font-size="11">JsdocTag (@param)</text>
    <text x="240" y="112" fill="#efeaf5" font-size="10">parent=1  next=0</text>

    <!-- node[3] JsdocTagName "param" -->
    <rect x="40" y="128" width="340" height="32" rx="4" fill="url(#gNd)" opacity="0.7" stroke="#7b59ac" stroke-width="1"/>
    <text x="50" y="148" fill="#fff" font-size="11" font-weight="bold">node[3]</text>
    <text x="120" y="148" fill="#fff" font-size="11">JsdocTagName "param"</text>
    <text x="270" y="148" fill="#efeaf5" font-size="10">parent=2  next=4</text>

    <!-- node[4] JsdocTagNameValue "x" -->
    <rect x="40" y="164" width="340" height="32" rx="4" fill="url(#gNd)" opacity="0.7" stroke="#7b59ac" stroke-width="1"/>
    <text x="50" y="184" fill="#fff" font-size="11" font-weight="bold">node[4]</text>
    <text x="120" y="184" fill="#fff" font-size="11">JsdocTagNameValue "x"</text>
    <text x="270" y="184" fill="#efeaf5" font-size="10">parent=2  next=0</text>

    <!-- annotation: tags list metadata source -->
    <text x="0" y="222" fill="#888" font-size="9" font-style="italic">(JsdocBlock's `tags` list metadata in ED bytes 56-61 = (head=2, count=1))</text>
  </g>

  <!-- Tree visualization (right side) -->
  <g transform="translate(450, 385)">
    <text x="0" y="14" font-size="11" font-weight="bold" fill="#7b59ac" font-family="-apple-system, system-ui, sans-serif">Reconstructed tree (via parent + next_sibling)</text>

    <!-- Tree drawing -->
    <rect x="0" y="20" width="430" height="220" rx="6" fill="#f8f8f8" stroke="#ccc"/>

    <!-- Root: node[1] JsdocBlock -->
    <rect x="155" y="35" width="120" height="28" rx="4" fill="url(#gNd)" opacity="0.85"/>
    <text x="215" y="54" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">JsdocBlock [1]</text>

    <!-- Edge from [1] to [2] -->
    <line x1="215" y1="63" x2="215" y2="80" stroke="#7b59ac" stroke-width="1.5"/>

    <!-- node[2] JsdocTag (direct child; tags list head/count in JsdocBlock's ED) -->
    <rect x="155" y="80" width="120" height="28" rx="4" fill="url(#gNd)" opacity="0.85"/>
    <text x="215" y="99" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">JsdocTag [2]</text>

    <!-- Edges from [2] to [3] and [4] -->
    <line x1="215" y1="108" x2="215" y2="125" stroke="#7b59ac" stroke-width="1.5"/>
    <line x1="80" y1="125" x2="350" y2="125" stroke="#7b59ac" stroke-width="1.5"/>
    <line x1="80" y1="170" x2="80" y2="180" stroke="#7b59ac" stroke-width="1.5"/>
    <line x1="350" y1="170" x2="350" y2="180" stroke="#7b59ac" stroke-width="1.5"/>

    <!-- node[4] JsdocTagName -->
    <rect x="20" y="180" width="120" height="28" rx="4" fill="url(#gNd)" opacity="0.7"/>
    <text x="80" y="199" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">tag "param" [4]</text>

    <!-- node[5] JsdocTagNameValue (sibling of [4]) -->
    <rect x="290" y="180" width="120" height="28" rx="4" fill="url(#gNd)" opacity="0.7"/>
    <text x="350" y="199" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">name "x" [5]</text>

    <!-- next_sibling arrow from [4] to [5] -->
    <line x1="140" y1="194" x2="285" y2="194" stroke="#c43e3e" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#ar-red)"/>
    <text x="215" y="225" text-anchor="middle" fill="#c43e3e" font-size="10" font-style="italic">next_sibling = 5</text>
  </g>

  <!-- ============================================================ -->
  <!-- Section 4: Tree reconstruction rules (notes)                 -->
  <!-- ============================================================ -->
  <g transform="translate(40, 645)">
    <rect width="840" height="135" rx="6" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
    <text x="15" y="22" font-size="12" font-weight="bold" fill="#444" font-family="-apple-system, system-ui, sans-serif">Tree reconstruction rules (tsgo-style)</text>

    <text x="15" y="46" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan font-weight="bold">First child = node[i+1]</tspan> (if <tspan font-family="monospace">node[i+1].parent == i</tspan>) — DFS pre-order layout enables this fast lookup</text>
    <text x="15" y="64" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan font-weight="bold">Sibling chain</tspan>: follow <tspan font-family="monospace">next_sibling</tspan> until 0 (sentinel)</text>
    <text x="15" y="82" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan font-weight="bold">Roots</tspan>: nodes with <tspan font-family="monospace">parent == 0</tspan> (point to sentinel) — referenced by Root Index Array</text>
    <text x="15" y="100" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan font-weight="bold">node[0] is sentinel</tspan>: all bytes zero — index 0 means "no link" (no parent / no sibling / parse failed root)</text>
    <text x="15" y="118" font-size="11" fill="#444" font-family="-apple-system, system-ui, sans-serif">• <tspan font-weight="bold">Random access</tspan>: <tspan font-family="monospace">node[i]</tspan> is at <tspan font-family="monospace">Header.nodesOffset + i × 24</tspan> — O(1)</text>
  </g>
</svg>
