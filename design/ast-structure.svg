<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1350" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">
  <defs>
    <style>
      .title { font-size: 25px; font-weight: 700; fill: #14213d; }
      .subtitle { font-size: 14px; fill: #607089; }
      .section { font-size: 17px; font-weight: 700; fill: #26364f; }
      .note { font-size: 12px; fill: #64748b; }
      .mono { font-family: Menlo, Consolas, monospace; }
      .root rect { fill: #14213d; rx: 10; ry: 10; }
      .root text { fill: #fff; font-weight: 700; }
      .node rect { fill: #eaf4ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; ry: 8; }
      .node .name { fill: #1d4ed8; font-weight: 700; font-size: 15px; }
      .node .field { fill: #334155; font-size: 12px; }
      .line rect { fill: #ecfdf5; stroke: #16a34a; stroke-width: 1.5; rx: 8; ry: 8; }
      .line .name { fill: #15803d; font-weight: 700; font-size: 15px; }
      .tag rect { fill: #fff7ed; stroke: #f97316; stroke-width: 1.5; rx: 8; ry: 8; }
      .tag .name { fill: #c2410c; font-weight: 700; font-size: 15px; }
      .inline rect { fill: #fdf2f8; stroke: #db2777; stroke-width: 1.5; rx: 8; ry: 8; }
      .inline .name { fill: #be185d; font-weight: 700; font-size: 15px; }
      .future rect { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.3; stroke-dasharray: 6 4; rx: 8; ry: 8; }
      .future .name { fill: #475569; font-weight: 700; font-size: 15px; }
      .phase rect { fill: #fff; stroke: #cbd5e1; stroke-width: 1.3; rx: 8; ry: 8; }
      .phase .name { fill: #334155; font-weight: 700; font-size: 14px; }
      .edge { stroke: #64748b; stroke-width: 1.5; fill: none; }
      .edge-vec { stroke: #2563eb; stroke-width: 2; fill: none; }
      .edge-opt { stroke: #94a3b8; stroke-width: 1.4; fill: none; stroke-dasharray: 5 4; }
      .label { font-size: 11px; fill: #64748b; font-style: italic; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-opt" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="700" y="42" text-anchor="middle" class="title">ox-jsdoc AST Structure</text>
  <text x="700" y="66" text-anchor="middle" class="subtitle">ESTree-like public AST for oxlint and ESLint, with delayed semantic extensions</text>

  <g class="phase" transform="translate(80, 100)">
    <rect x="0" y="0" width="1240" height="86"/>
    <text x="22" y="28" class="name">Design split</text>
    <text x="22" y="52" class="note">Rust AST stores Span and borrowed source slices. JS / JSON serialization emits ESTree-style type, start, end, optional range, and optional loc.</text>
    <text x="22" y="72" class="note">Parser builds syntax. Validator, analyzer, and type parser attach semantic facts later.</text>
  </g>

  <text x="80" y="235" class="section">1. Core visitable AST</text>

  <g class="root" transform="translate(530, 270)">
    <rect x="0" y="0" width="340" height="86"/>
    <text x="170" y="31" text-anchor="middle">JsdocBlock</text>
    <text x="170" y="54" text-anchor="middle" font-size="12" fill="#cbd5e1">span, delimiter, terminal</text>
    <text x="170" y="72" text-anchor="middle" font-size="12" fill="#cbd5e1">description + descriptionLines[] + tags[] + inlineTags[]</text>
  </g>

  <g class="line" transform="translate(90, 445)">
    <rect x="0" y="0" width="330" height="118"/>
    <text x="165" y="28" text-anchor="middle" class="name">JsdocDescriptionLine</text>
    <text x="20" y="54" class="field">span: Span</text>
    <text x="20" y="74" class="field">delimiter: &amp;'a str</text>
    <text x="20" y="94" class="field">postDelimiter, initial, description</text>
  </g>

  <g class="tag" transform="translate(535, 430)">
    <rect x="0" y="0" width="330" height="152"/>
    <text x="165" y="28" text-anchor="middle" class="name">JsdocTag</text>
    <text x="20" y="54" class="field">tag: JsdocTagName</text>
    <text x="20" y="74" class="field">rawType?: JsdocTypeSource</text>
    <text x="20" y="94" class="field">parsedType?: JsdocType</text>
    <text x="20" y="114" class="field">name?, optional, defaultValue?</text>
    <text x="20" y="134" class="field">descriptionLines[] + typeLines[] + inlineTags[]</text>
  </g>

  <g class="inline" transform="translate(980, 445)">
    <rect x="0" y="0" width="330" height="118"/>
    <text x="165" y="28" text-anchor="middle" class="name">JsdocInlineTag</text>
    <text x="20" y="54" class="field">tag: JsdocTagName</text>
    <text x="20" y="74" class="field">namepathOrURL?, text?</text>
    <text x="20" y="94" class="field">format: plain | pipe | space | prefix | unknown</text>
  </g>

  <path d="M 590,356 C 450,392 300,405 255,445" class="edge-vec" marker-end="url(#arrow-blue)"/>
  <text x="350" y="397" class="label">descriptionLines[]</text>
  <path d="M 700,356 L 700,430" class="edge-vec" marker-end="url(#arrow-blue)"/>
  <text x="710" y="397" class="label">tags[]</text>
  <path d="M 815,356 C 960,392 1105,405 1145,445" class="edge-vec" marker-end="url(#arrow-blue)"/>
  <text x="980" y="397" class="label">inlineTags[]</text>

  <g class="line" transform="translate(340, 645)">
    <rect x="0" y="0" width="300" height="94"/>
    <text x="150" y="28" text-anchor="middle" class="name">JsdocTypeLine</text>
    <text x="20" y="54" class="field">rawType: &amp;'a str</text>
    <text x="20" y="74" class="field">delimiter, postDelimiter, initial</text>
  </g>

  <g class="node" transform="translate(760, 645)">
    <rect x="0" y="0" width="300" height="94"/>
    <text x="150" y="28" text-anchor="middle" class="name">JsdocTagBody</text>
    <text x="20" y="54" class="field">Generic(type?, value?, description?)</text>
    <text x="20" y="74" class="field">Borrows(source, target) | Raw(raw)</text>
  </g>

  <path d="M 610,582 C 570,615 510,615 490,645" class="edge-vec" marker-end="url(#arrow-blue)"/>
  <text x="520" y="625" class="label">typeLines[]</text>
  <path d="M 790,582 C 840,612 880,612 910,645" class="edge-opt" marker-end="url(#arrow-opt)"/>
  <text x="850" y="625" class="label">body?</text>

  <text x="80" y="815" class="section">2. Deferred structured extensions</text>

  <g class="future" transform="translate(90, 860)">
    <rect x="0" y="0" width="350" height="120"/>
    <text x="175" y="28" text-anchor="middle" class="name">JsdocTypeSource -&gt; JsdocType*</text>
    <text x="20" y="56" class="field">v1 parser stores raw type text</text>
    <text x="20" y="76" class="field">future type parser fills parsedType</text>
    <text x="20" y="96" class="field">keeps parser hot path small</text>
  </g>

  <g class="future" transform="translate(525, 860)">
    <rect x="0" y="0" width="350" height="120"/>
    <text x="175" y="28" text-anchor="middle" class="name">JsdocNamepathSource -&gt; JsdocNamepath*</text>
    <text x="20" y="56" class="field">v1 parser stores raw namepath text</text>
    <text x="20" y="76" class="field">validator checks mode-specific validity</text>
    <text x="20" y="96" class="field">analyzer can expose normalized facts</text>
  </g>

  <g class="future" transform="translate(960, 860)">
    <rect x="0" y="0" width="350" height="120"/>
    <text x="175" y="28" text-anchor="middle" class="name">JsdocParameterPath*</text>
    <text x="20" y="56" class="field">v1 exposes name + optional/default</text>
    <text x="20" y="76" class="field">future parser attaches parsed_path</text>
    <text x="20" y="96" class="field">supports strict lint fixes later</text>
  </g>

  <text x="80" y="1065" class="section">3. Integration boundary</text>

  <g class="phase" transform="translate(90, 1110)">
    <rect x="0" y="0" width="350" height="120"/>
    <text x="175" y="28" text-anchor="middle" class="name">Parser</text>
    <text x="20" y="56" class="note">Builds JsdocBlock from one /** ... */ comment.</text>
    <text x="20" y="78" class="note">Returns recoverable diagnostics with the AST.</text>
  </g>

  <g class="phase" transform="translate(525, 1110)">
    <rect x="0" y="0" width="350" height="120"/>
    <text x="175" y="28" text-anchor="middle" class="name">Validator / Analyzer</text>
    <text x="20" y="56" class="note">Applies TagSpec, mode rules, and derived facts.</text>
    <text x="20" y="78" class="note">Does not rebuild the parse tree.</text>
  </g>

  <g class="phase" transform="translate(960, 1110)">
    <rect x="0" y="0" width="350" height="120"/>
    <text x="175" y="28" text-anchor="middle" class="name">Serializer / Binding</text>
    <text x="20" y="56" class="note">Emits ESTree-like type/start/end/range/loc.</text>
    <text x="20" y="78" class="note">Converts borrowed slices to JS strings.</text>
  </g>

  <path d="M 440,1170 L 525,1170" class="edge" marker-end="url(#arrow)"/>
  <path d="M 875,1170 L 960,1170" class="edge" marker-end="url(#arrow)"/>
</svg>
