  <g class="source-box" transform="translate(610, 58)">
    <rect x="0" y="0" width="760" height="135"/>
    <text x="10" y="16" class="source-text source-comment">/**</text>
    <text x="10" y="30" class="source-text"><tspan class="source-comment"> * Find a user.</tspan></text>
    <text x="10" y="44" class="source-text"><tspan class="source-comment"> * See </tspan><tspan class="source-tag">{@link UserService}</tspan><tspan class="source-comment"> for details.</tspan></text>
    <text x="10" y="58" class="source-text source-comment"> *</text>
    <text x="10" y="72" class="source-text"><tspan class="source-comment"> * </tspan><tspan class="source-tag">@param</tspan> <tspan class="source-type">{string|number}</tspan> <tspan class="source-name">id</tspan> - The user ID</text>
    <text x="10" y="86" class="source-text"><tspan class="source-comment"> * </tspan><tspan class="source-tag">@param</tspan> <tspan class="source-type">{Object.&lt;string, *&gt;}</tspan> <tspan class="source-name">[options={}]</tspan> - Options</text>
    <text x="10" y="100" class="source-text"><tspan class="source-comment"> * </tspan><tspan class="source-tag">@returns</tspan> <tspan class="source-type">{Promise.&lt;User&gt;}</tspan> The found user</text>
    <text x="10" y="114" class="source-text"><tspan class="source-comment"> * </tspan><tspan class="source-tag">@throws</tspan> <tspan class="source-type">{NotFoundError}</tspan> If the user is not found</text>
    <text x="10" y="128" class="source-text"><tspan class="source-comment"> * </tspan><tspan class="source-tag">@since</tspan> 2.0.0  ·  <tspan class="source-tag">@deprecated</tspan> Will be removed in 3.0.0. Use <tspan class="source-tag">{@link findUserById}</tspan> instead. <tspan class="source-comment">*/</tspan></text>
  </g>

