<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1120" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">
  <defs>
    <style>
      .title { font-size: 25px; font-weight: 700; fill: #14213d; }
      .subtitle { font-size: 14px; fill: #607089; }
      .source rect { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.3; rx: 8; ry: 8; }
      .code { font-family: Menlo, Consolas, monospace; font-size: 12px; fill: #334155; }
      .comment { fill: #6b7280; }
      .tag-text { fill: #dc2626; font-weight: 700; }
      .type-text { fill: #2563eb; }
      .name-text { fill: #ea580c; }
      .root rect { fill: #14213d; rx: 8; ry: 8; }
      .root text { fill: #fff; font-weight: 700; }
      .node rect { fill: #eaf4ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; ry: 8; }
      .node .name { fill: #1d4ed8; font-weight: 700; font-size: 14px; }
      .line rect { fill: #ecfdf5; stroke: #16a34a; stroke-width: 1.5; rx: 8; ry: 8; }
      .line .name { fill: #15803d; font-weight: 700; font-size: 14px; }
      .tag rect { fill: #fff7ed; stroke: #f97316; stroke-width: 1.5; rx: 8; ry: 8; }
      .tag .name { fill: #c2410c; font-weight: 700; font-size: 14px; }
      .inline rect { fill: #fdf2f8; stroke: #db2777; stroke-width: 1.5; rx: 8; ry: 8; }
      .inline .name { fill: #be185d; font-weight: 700; font-size: 14px; }
      .body rect { fill: #fffbea; stroke: #eab308; stroke-width: 1.5; rx: 8; ry: 8; }
      .body .name { fill: #a16207; font-weight: 700; font-size: 14px; }
      .field { fill: #334155; font-size: 12px; }
      .mono { font-family: Menlo, Consolas, monospace; font-size: 11px; fill: #334155; }
      .edge { stroke: #64748b; stroke-width: 1.5; fill: none; }
      .edge-vec { stroke: #2563eb; stroke-width: 1.8; fill: none; }
      .edge-opt { stroke: #94a3b8; stroke-width: 1.3; fill: none; stroke-dasharray: 5 4; }
      .label { font-size: 11px; fill: #64748b; font-style: italic; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-opt" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="750" y="42" text-anchor="middle" class="title">ox-jsdoc AST Parse Example</text>
  <text x="750" y="66" text-anchor="middle" class="subtitle">Concrete ESTree-like shape: JsdocBlock, JsdocTag, JsdocDescriptionLine, JsdocTypeLine, JsdocInlineTag</text>

  <g class="source" transform="translate(80, 95)">
    <rect x="0" y="0" width="1340" height="142"/>
    <text x="18" y="24" class="code comment">/**</text>
    <text x="18" y="44" class="code"><tspan class="comment"> * Find a user. See </tspan><tspan class="tag-text">{@link UserService}</tspan><tspan class="comment"> for details.</tspan></text>
    <text x="18" y="64" class="code"><tspan class="comment"> * </tspan><tspan class="tag-text">@param</tspan> <tspan class="type-text">{string|number}</tspan> <tspan class="name-text">id</tspan> - The user ID</text>
    <text x="18" y="84" class="code"><tspan class="comment"> * </tspan><tspan class="tag-text">@param</tspan> <tspan class="type-text">{Object.&lt;string, *&gt;}</tspan> <tspan class="name-text">[options={}]</tspan> - Options</text>
    <text x="18" y="104" class="code"><tspan class="comment"> * </tspan><tspan class="tag-text">@returns</tspan> <tspan class="type-text">{Promise.&lt;User&gt;}</tspan> The found user</text>
    <text x="18" y="124" class="code"><tspan class="comment"> */</tspan></text>
  </g>

  <g class="root" transform="translate(580, 285)">
    <rect x="0" y="0" width="340" height="86"/>
    <text x="170" y="30" text-anchor="middle">JsdocBlock</text>
    <text x="170" y="54" text-anchor="middle" font-size="12" fill="#cbd5e1">description: "Find a user. See ..."</text>
    <text x="170" y="72" text-anchor="middle" font-size="12" fill="#cbd5e1">tags[3], inlineTags[1], descriptionLines[1]</text>
  </g>

  <g class="line" transform="translate(90, 450)">
    <rect x="0" y="0" width="380" height="112"/>
    <text x="190" y="28" text-anchor="middle" class="name">descriptionLines[0]</text>
    <text x="20" y="54" class="field">type: "JsdocDescriptionLine"</text>
    <text x="20" y="74" class="mono">delimiter: "*"  description: "Find a user. See ..."</text>
    <text x="20" y="94" class="mono">span: source line containing prose</text>
  </g>

  <g class="inline" transform="translate(1030, 450)">
    <rect x="0" y="0" width="360" height="112"/>
    <text x="180" y="28" text-anchor="middle" class="name">inlineTags[0]</text>
    <text x="20" y="54" class="field">type: "JsdocInlineTag"</text>
    <text x="20" y="74" class="mono">tag: "link"</text>
    <text x="20" y="94" class="mono">namepathOrURL: "UserService"  format: "plain"</text>
  </g>

  <path d="M 610,371 C 475,412 330,414 280,450" class="edge-vec" marker-end="url(#arrow-blue)"/>
  <text x="390" y="418" class="label">descriptionLines[]</text>
  <path d="M 895,371 C 1030,412 1160,414 1210,450" class="edge-vec" marker-end="url(#arrow-blue)"/>
  <text x="1040" y="418" class="label">inlineTags[]</text>

  <path d="M 750,371 L 750,615" class="edge-vec" marker-end="url(#arrow-blue)"/>
  <text x="762" y="498" class="label">tags[]</text>

  <g class="tag" transform="translate(95, 650)">
    <rect x="0" y="0" width="380" height="150"/>
    <text x="190" y="28" text-anchor="middle" class="name">tags[0]: JsdocTag</text>
    <text x="20" y="54" class="mono">tag: "param"</text>
    <text x="20" y="74" class="mono">rawType: "string|number"</text>
    <text x="20" y="94" class="mono">name: "id"  optional: false</text>
    <text x="20" y="114" class="mono">description: "The user ID"</text>
    <text x="20" y="134" class="mono">rawBody: "{string|number} id - The user ID"</text>
  </g>

  <g class="tag" transform="translate(560, 650)">
    <rect x="0" y="0" width="380" height="150"/>
    <text x="190" y="28" text-anchor="middle" class="name">tags[1]: JsdocTag</text>
    <text x="20" y="54" class="mono">tag: "param"</text>
    <text x="20" y="74" class="mono">rawType: "Object.&lt;string, *&gt;"</text>
    <text x="20" y="94" class="mono">name: "options"  optional: true</text>
    <text x="20" y="114" class="mono">defaultValue: "{}"</text>
    <text x="20" y="134" class="mono">description: "Options"</text>
  </g>

  <g class="tag" transform="translate(1025, 650)">
    <rect x="0" y="0" width="380" height="150"/>
    <text x="190" y="28" text-anchor="middle" class="name">tags[2]: JsdocTag</text>
    <text x="20" y="54" class="mono">tag: "returns"</text>
    <text x="20" y="74" class="mono">rawType: "Promise.&lt;User&gt;"</text>
    <text x="20" y="94" class="mono">name: null</text>
    <text x="20" y="114" class="mono">description: "The found user"</text>
    <text x="20" y="134" class="mono">parsedType: null in parser-only mode</text>
  </g>

  <path d="M 690,615 C 555,624 360,620 285,650" class="edge-vec" marker-end="url(#arrow-blue)"/>
  <path d="M 750,615 L 750,650" class="edge-vec" marker-end="url(#arrow-blue)"/>
  <path d="M 810,615 C 945,624 1140,620 1215,650" class="edge-vec" marker-end="url(#arrow-blue)"/>

  <g class="line" transform="translate(160, 870)">
    <rect x="0" y="0" width="300" height="94"/>
    <text x="150" y="28" text-anchor="middle" class="name">typeLines[0]</text>
    <text x="20" y="54" class="mono">rawType: "{string|number}"</text>
    <text x="20" y="74" class="mono">source-preserving line syntax</text>
  </g>

  <g class="body" transform="translate(600, 870)">
    <rect x="0" y="0" width="300" height="94"/>
    <text x="150" y="28" text-anchor="middle" class="name">body: Generic</text>
    <text x="20" y="54" class="mono">typeSource + value + separator</text>
    <text x="20" y="74" class="mono">keeps rawBody for recovery</text>
  </g>

  <g class="node" transform="translate(1040, 870)">
    <rect x="0" y="0" width="300" height="94"/>
    <text x="150" y="28" text-anchor="middle" class="name">future parsedType</text>
    <text x="20" y="54" class="mono">JsdocTypeUnion(...)</text>
    <text x="20" y="74" class="mono">added by type parser phase</text>
  </g>

  <path d="M 285,800 L 310,870" class="edge-vec" marker-end="url(#arrow-blue)"/>
  <text x="315" y="836" class="label">typeLines[]</text>
  <path d="M 750,800 L 750,870" class="edge-opt" marker-end="url(#arrow-opt)"/>
  <text x="762" y="836" class="label">body?</text>
  <path d="M 1215,800 L 1190,870" class="edge-opt" marker-end="url(#arrow-opt)"/>
  <text x="1210" y="836" class="label">parsedType?</text>

  <text x="750" y="1040" text-anchor="middle" class="field">Rust AST keeps Span and borrowed slices. JS output adds type/start/end/range/loc for ESTree-compatible consumers.</text>
</svg>
