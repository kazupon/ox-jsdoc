<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1950" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12">
  <defs>
    <style>
      .title { font-size: 20px; font-weight: bold; fill: #1a1a2e; }
      .subtitle { font-size: 12px; fill: #666; }
      .source-box rect { fill: #f8f8f8; stroke: #ccc; stroke-width: 1; rx: 6; ry: 6; }
      .source-text { font-family: 'Menlo', 'Consolas', monospace; font-size: 11px; fill: #333; }
      .source-comment { fill: #6a737d; }
      .source-tag { fill: #d73a49; font-weight: bold; }
      .source-type { fill: #005cc5; }
      .source-name { fill: #e36209; }
      .root rect { fill: #1a1a2e; rx: 6; ry: 6; }
      .root text { fill: #fff; font-weight: bold; }
      .desc rect { fill: #e8f4f8; stroke: #2196F3; stroke-width: 1.5; rx: 5; ry: 5; }
      .desc .label { fill: #0d47a1; font-weight: bold; font-size: 11px; }
      .tag rect { fill: #fff3e0; stroke: #ff9800; stroke-width: 1.5; rx: 5; ry: 5; }
      .tag .label { fill: #e65100; font-weight: bold; font-size: 11px; }
      .type rect { fill: #f3e5f5; stroke: #9c27b0; stroke-width: 1.5; rx: 5; ry: 5; }
      .type .label { fill: #6a1b9a; font-weight: bold; font-size: 11px; }
      .leaf rect { fill: #e8f5e9; stroke: #4caf50; stroke-width: 1.5; rx: 5; ry: 5; }
      .leaf .label { fill: #1b5e20; font-weight: bold; font-size: 11px; }
      .leaf .val { fill: #2e7d32; font-size: 10px; font-family: 'Menlo', 'Consolas', monospace; }
      .name rect { fill: #e3f2fd; stroke: #1976D2; stroke-width: 1.5; rx: 5; ry: 5; }
      .name .label { fill: #0d47a1; font-weight: bold; font-size: 11px; }
      .inline rect { fill: #fce4ec; stroke: #e91e63; stroke-width: 1.5; rx: 5; ry: 5; }
      .inline .label { fill: #880e4f; font-weight: bold; font-size: 11px; }
      .edge { stroke: #78909c; stroke-width: 1.2; fill: none; }
      .edge-label { font-size: 9px; fill: #78909c; font-style: italic; }
      .legend rect { rx: 3; ry: 3; }
      .legend text { font-size: 10px; fill: #444; }
    </style>
    <marker id="arr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#78909c"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="750" y="30" text-anchor="middle" class="title">ox-jsdoc AST — Parse Example</text>
  <text x="750" y="48" text-anchor="middle" class="subtitle">Concrete AST tree for the JSDoc comment in design/ast.md Section 10</text>

  <!-- Legend -->
  <g transform="translate(20, 62)">
    <rect x="0" y="0" width="460" height="28" fill="#fafafa" stroke="#ddd" rx="4" ry="4"/>
    <rect class="legend" x="8" y="7" width="12" height="12" fill="#1a1a2e"/>
    <text class="legend" x="24" y="17">Root</text>
    <rect class="legend" x="60" y="7" width="12" height="12" fill="#e8f4f8" stroke="#2196F3" stroke-width="1"/>
    <text class="legend" x="76" y="17">Description</text>
    <rect class="legend" x="140" y="7" width="12" height="12" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text class="legend" x="156" y="17">BlockTag</text>
    <rect class="legend" x="215" y="7" width="12" height="12" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text class="legend" x="231" y="17">TypeExpr</text>
    <rect class="legend" x="295" y="7" width="12" height="12" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
    <text class="legend" x="311" y="17">InlineTag</text>
    <rect class="legend" x="370" y="7" width="12" height="12" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
    <text class="legend" x="386" y="17">Leaf / Text</text>
  </g>

  <!-- Source code box -->
  <g class="source-box" transform="translate(530, 58)">
    <rect x="0" y="0" width="950" height="135"/>
    <text x="10" y="16" class="source-text source-comment">/**</text>
    <text x="10" y="30" class="source-text"><tspan class="source-comment"> * Find a user.</tspan></text>
    <text x="10" y="44" class="source-text"><tspan class="source-comment"> * See </tspan><tspan class="source-tag">{@link UserService}</tspan><tspan class="source-comment"> for details.</tspan></text>
    <text x="10" y="58" class="source-text source-comment"> *</text>
    <text x="10" y="72" class="source-text"><tspan class="source-comment"> * </tspan><tspan class="source-tag">@param</tspan> <tspan class="source-type">{string|number}</tspan> <tspan class="source-name">id</tspan> - The user ID</text>
    <text x="10" y="86" class="source-text"><tspan class="source-comment"> * </tspan><tspan class="source-tag">@param</tspan> <tspan class="source-type">{Object.&lt;string, *&gt;}</tspan> <tspan class="source-name">[options={}]</tspan> - Options</text>
    <text x="10" y="100" class="source-text"><tspan class="source-comment"> * </tspan><tspan class="source-tag">@returns</tspan> <tspan class="source-type">{Promise.&lt;User&gt;}</tspan> The found user</text>
    <text x="10" y="114" class="source-text"><tspan class="source-comment"> * </tspan><tspan class="source-tag">@throws</tspan> <tspan class="source-type">{NotFoundError}</tspan> If the user is not found</text>
    <text x="10" y="128" class="source-text"><tspan class="source-comment"> * </tspan><tspan class="source-tag">@since</tspan> 2.0.0  ·  <tspan class="source-tag">@deprecated</tspan> Will be removed in 3.0.0. Use <tspan class="source-tag">{@link findUserById}</tspan> instead. <tspan class="source-comment">*/</tspan></text>
  </g>

  <!-- ================================================================== -->
  <!-- ROOT: JSDocComment -->
  <!-- ================================================================== -->
  <g class="root" transform="translate(650, 220)">
    <rect x="0" y="0" width="200" height="32"/>
    <text x="100" y="21" text-anchor="middle" font-size="14">JSDocComment</text>
  </g>

  <!-- ================================================================== -->
  <!-- DESCRIPTION (top-level) -->
  <!-- ================================================================== -->
  <!-- root -> description -->
  <line x1="700" y1="252" x2="280" y2="290" class="edge" marker-end="url(#arr)"/>
  <text x="460" y="268" class="edge-label">description</text>

  <g class="desc" transform="translate(120, 290)">
    <rect x="0" y="0" width="320" height="28"/>
    <text x="160" y="18" text-anchor="middle" class="label">Description</text>
  </g>

  <!-- Description parts -->
  <!-- Text("Find a user.\nSee ") -->
  <line x1="200" y1="318" x2="100" y2="348" class="edge" marker-end="url(#arr)"/>
  <text x="130" y="336" class="edge-label">parts[0]</text>
  <g class="leaf" transform="translate(10, 348)">
    <rect x="0" y="0" width="185" height="38"/>
    <text x="92" y="14" text-anchor="middle" class="label">Text</text>
    <text x="92" y="32" text-anchor="middle" class="val">"Find a user.\nSee "</text>
  </g>

  <!-- InlineTag {@link UserService} -->
  <line x1="280" y1="318" x2="280" y2="348" class="edge" marker-end="url(#arr)"/>
  <text x="290" y="336" class="edge-label">parts[1]</text>
  <g class="inline" transform="translate(210, 348)">
    <rect x="0" y="0" width="155" height="38"/>
    <text x="78" y="14" text-anchor="middle" class="label">InlineTag</text>
    <text x="78" y="32" text-anchor="middle" class="val">@link UserService</text>
  </g>

  <!-- InlineTag -> Link -> NamePath -->
  <line x1="288" y1="386" x2="288" y2="410" class="edge" marker-end="url(#arr)"/>
  <g class="name" transform="translate(225, 410)">
    <rect x="0" y="0" width="130" height="30"/>
    <text x="65" y="12" text-anchor="middle" class="label">NamePath</text>
    <text x="65" y="25" text-anchor="middle" class="val">"UserService"</text>
  </g>

  <!-- Text(" for details.") -->
  <line x1="370" y1="318" x2="430" y2="348" class="edge" marker-end="url(#arr)"/>
  <text x="415" y="336" class="edge-label">parts[2]</text>
  <g class="leaf" transform="translate(380, 348)">
    <rect x="0" y="0" width="155" height="38"/>
    <text x="78" y="14" text-anchor="middle" class="label">Text</text>
    <text x="78" y="32" text-anchor="middle" class="val">" for details."</text>
  </g>

  <!-- ================================================================== -->
  <!-- TAGS -->
  <!-- ================================================================== -->
  <!-- root -> tags -->
  <line x1="800" y1="252" x2="800" y2="290" class="edge" marker-end="url(#arr)"/>
  <text x="810" y="270" class="edge-label">tags</text>

  <!-- ================================================================== -->
  <!-- tags[0]: @param {string|number} id -->
  <!-- ================================================================== -->
  <line x1="750" y1="290" x2="170" y2="470" class="edge" marker-end="url(#arr)"/>
  <text x="80" y="468" class="edge-label">tags[0]</text>

  <g class="tag" transform="translate(60, 475)">
    <rect x="0" y="0" width="220" height="28"/>
    <text x="110" y="18" text-anchor="middle" class="label">BlockTag  @param</text>
  </g>

  <!-- type: Union -->
  <line x1="120" y1="503" x2="60" y2="528" class="edge" marker-end="url(#arr)"/>
  <text x="40" y="520" class="edge-label">type</text>
  <g class="type" transform="translate(10, 533)">
    <rect x="0" y="0" width="115" height="26"/>
    <text x="58" y="17" text-anchor="middle" class="label">UnionType</text>
  </g>
  <!-- Union children -->
  <line x1="35" y1="559" x2="15" y2="580" class="edge" marker-end="url(#arr)"/>
  <g class="type" transform="translate(0, 583)">
    <rect x="0" y="0" width="60" height="24"/>
    <text x="30" y="16" text-anchor="middle" class="val">string</text>
  </g>
  <line x1="90" y1="559" x2="90" y2="580" class="edge" marker-end="url(#arr)"/>
  <g class="type" transform="translate(65, 583)">
    <rect x="0" y="0" width="65" height="24"/>
    <text x="33" y="16" text-anchor="middle" class="val">number</text>
  </g>

  <!-- name: Required(id) -->
  <line x1="170" y1="503" x2="165" y2="528" class="edge" marker-end="url(#arr)"/>
  <text x="145" y="520" class="edge-label">name</text>
  <g class="name" transform="translate(140, 533)">
    <rect x="0" y="0" width="100" height="26"/>
    <text x="50" y="11" text-anchor="middle" class="label">Required</text>
    <text x="50" y="23" text-anchor="middle" class="val">"id"</text>
  </g>

  <!-- description -->
  <line x1="230" y1="503" x2="265" y2="528" class="edge" marker-end="url(#arr)"/>
  <text x="255" y="520" class="edge-label">desc</text>
  <g class="leaf" transform="translate(245, 533)">
    <rect x="0" y="0" width="105" height="26"/>
    <text x="53" y="17" text-anchor="middle" class="val">"The user ID"</text>
  </g>

  <!-- ================================================================== -->
  <!-- tags[1]: @param {Object.<string, *>} [options={}] -->
  <!-- ================================================================== -->
  <line x1="770" y1="290" x2="510" y2="470" class="edge" marker-end="url(#arr)"/>
  <text x="410" y="468" class="edge-label">tags[1]</text>

  <g class="tag" transform="translate(395, 475)">
    <rect x="0" y="0" width="220" height="28"/>
    <text x="110" y="18" text-anchor="middle" class="label">BlockTag  @param</text>
  </g>

  <!-- type: TypeApplication -->
  <line x1="455" y1="503" x2="420" y2="528" class="edge" marker-end="url(#arr)"/>
  <text x="390" y="520" class="edge-label">type</text>
  <g class="type" transform="translate(365, 533)">
    <rect x="0" y="0" width="130" height="26"/>
    <text x="65" y="17" text-anchor="middle" class="label">TypeApplication</text>
  </g>
  <!-- TypeApp children -->
  <line x1="400" y1="559" x2="380" y2="580" class="edge" marker-end="url(#arr)"/>
  <text x="370" y="575" class="edge-label">name</text>
  <g class="type" transform="translate(365, 583)">
    <rect x="0" y="0" width="55" height="24"/>
    <text x="28" y="16" text-anchor="middle" class="val">Object</text>
  </g>
  <line x1="430" y1="559" x2="430" y2="580" class="edge" marker-end="url(#arr)"/>
  <text x="440" y="575" class="edge-label">args</text>
  <g class="type" transform="translate(425, 583)">
    <rect x="0" y="0" width="50" height="24"/>
    <text x="25" y="16" text-anchor="middle" class="val">string</text>
  </g>
  <line x1="465" y1="559" x2="490" y2="580" class="edge" marker-end="url(#arr)"/>
  <g class="type" transform="translate(480, 583)">
    <rect x="0" y="0" width="25" height="24"/>
    <text x="13" y="16" text-anchor="middle" class="val">*</text>
  </g>

  <!-- name: Optional -->
  <line x1="530" y1="503" x2="540" y2="528" class="edge" marker-end="url(#arr)"/>
  <text x="520" y="520" class="edge-label">name</text>
  <g class="name" transform="translate(510, 533)">
    <rect x="0" y="0" width="120" height="38"/>
    <text x="60" y="13" text-anchor="middle" class="label">Optional</text>
    <text x="60" y="25" text-anchor="middle" class="val">"options"</text>
    <text x="60" y="35" text-anchor="middle" class="val" fill="#999">default: "{}"</text>
  </g>

  <!-- description -->
  <line x1="580" y1="503" x2="650" y2="528" class="edge" marker-end="url(#arr)"/>
  <text x="630" y="520" class="edge-label">desc</text>
  <g class="leaf" transform="translate(640, 533)">
    <rect x="0" y="0" width="90" height="26"/>
    <text x="45" y="17" text-anchor="middle" class="val">"Options"</text>
  </g>

  <!-- ================================================================== -->
  <!-- tags[2]: @returns {Promise.<User>} -->
  <!-- ================================================================== -->
  <line x1="810" y1="290" x2="850" y2="470" class="edge" marker-end="url(#arr)"/>
  <text x="760" y="468" class="edge-label">tags[2]</text>

  <g class="tag" transform="translate(760, 475)">
    <rect x="0" y="0" width="220" height="28"/>
    <text x="110" y="18" text-anchor="middle" class="label">BlockTag  @returns</text>
  </g>

  <!-- type: TypeApplication Promise -->
  <line x1="830" y1="503" x2="800" y2="528" class="edge" marker-end="url(#arr)"/>
  <text x="775" y="520" class="edge-label">type</text>
  <g class="type" transform="translate(750, 533)">
    <rect x="0" y="0" width="130" height="26"/>
    <text x="65" y="17" text-anchor="middle" class="label">TypeApplication</text>
  </g>
  <line x1="790" y1="559" x2="775" y2="580" class="edge" marker-end="url(#arr)"/>
  <g class="type" transform="translate(755, 583)">
    <rect x="0" y="0" width="60" height="24"/>
    <text x="30" y="16" text-anchor="middle" class="val">Promise</text>
  </g>
  <line x1="830" y1="559" x2="840" y2="580" class="edge" marker-end="url(#arr)"/>
  <g class="type" transform="translate(825, 583)">
    <rect x="0" y="0" width="45" height="24"/>
    <text x="23" y="16" text-anchor="middle" class="val">User</text>
  </g>

  <!-- description -->
  <line x1="920" y1="503" x2="920" y2="528" class="edge" marker-end="url(#arr)"/>
  <text x="930" y="520" class="edge-label">desc</text>
  <g class="leaf" transform="translate(885, 533)">
    <rect x="0" y="0" width="120" height="26"/>
    <text x="60" y="17" text-anchor="middle" class="val">"The found user"</text>
  </g>

  <!-- ================================================================== -->
  <!-- tags[3]: @throws {NotFoundError} -->
  <!-- ================================================================== -->
  <line x1="840" y1="290" x2="1130" y2="470" class="edge" marker-end="url(#arr)"/>
  <text x="1040" y="468" class="edge-label">tags[3]</text>

  <g class="tag" transform="translate(1040, 475)">
    <rect x="0" y="0" width="220" height="28"/>
    <text x="110" y="18" text-anchor="middle" class="label">BlockTag  @throws</text>
  </g>

  <!-- type: Name("NotFoundError") -->
  <line x1="1110" y1="503" x2="1080" y2="528" class="edge" marker-end="url(#arr)"/>
  <text x="1050" y="520" class="edge-label">type</text>
  <g class="type" transform="translate(1040, 533)">
    <rect x="0" y="0" width="110" height="26"/>
    <text x="55" y="17" text-anchor="middle" class="val">NotFoundError</text>
  </g>

  <!-- description -->
  <line x1="1200" y1="503" x2="1210" y2="528" class="edge" marker-end="url(#arr)"/>
  <text x="1220" y="520" class="edge-label">desc</text>
  <g class="leaf" transform="translate(1155, 533)">
    <rect x="0" y="0" width="195" height="26"/>
    <text x="98" y="17" text-anchor="middle" class="val">"If the user is not found"</text>
  </g>

  <!-- ================================================================== -->
  <!-- tags[4]: @since 2.0.0 -->
  <!-- ================================================================== -->
  <line x1="855" y1="290" x2="1370" y2="470" class="edge" marker-end="url(#arr)"/>
  <text x="1330" y="468" class="edge-label">tags[4]</text>

  <g class="tag" transform="translate(1320, 475)">
    <rect x="0" y="0" width="160" height="28"/>
    <text x="80" y="18" text-anchor="middle" class="label">BlockTag  @since</text>
  </g>

  <!-- description only -->
  <line x1="1400" y1="503" x2="1400" y2="528" class="edge" marker-end="url(#arr)"/>
  <text x="1410" y="520" class="edge-label">desc</text>
  <g class="leaf" transform="translate(1365, 533)">
    <rect x="0" y="0" width="75" height="26"/>
    <text x="38" y="17" text-anchor="middle" class="val">"2.0.0"</text>
  </g>

  <!-- ================================================================== -->
  <!-- tags[5]: @deprecated (with inline tag in description) -->
  <!-- ================================================================== -->

  <!-- Separator line -->
  <line x1="20" y1="640" x2="1480" y2="640" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="750" y="660" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">tags[5]: @deprecated — Description with nested InlineTag</text>

  <!-- root -> tags[5] -->
  <g class="tag" transform="translate(600, 685)">
    <rect x="0" y="0" width="300" height="28"/>
    <text x="150" y="18" text-anchor="middle" class="label">BlockTag  @deprecated</text>
  </g>

  <!-- description (complex) -->
  <line x1="750" y1="713" x2="750" y2="745" class="edge" marker-end="url(#arr)"/>
  <text x="760" y="733" class="edge-label">description</text>

  <g class="desc" transform="translate(530, 750)">
    <rect x="0" y="0" width="440" height="28"/>
    <text x="220" y="18" text-anchor="middle" class="label">Description</text>
  </g>

  <!-- parts[0]: Text -->
  <line x1="640" y1="778" x2="500" y2="810" class="edge" marker-end="url(#arr)"/>
  <text x="530" y="798" class="edge-label">parts[0]</text>
  <g class="leaf" transform="translate(310, 815)">
    <rect x="0" y="0" width="285" height="38"/>
    <text x="143" y="14" text-anchor="middle" class="label">Text</text>
    <text x="143" y="32" text-anchor="middle" class="val">"Will be removed in 3.0.0. Use "</text>
  </g>

  <!-- parts[1]: InlineTag {@link findUserById} -->
  <line x1="750" y1="778" x2="750" y2="810" class="edge" marker-end="url(#arr)"/>
  <text x="760" y="798" class="edge-label">parts[1]</text>
  <g class="inline" transform="translate(640, 815)">
    <rect x="0" y="0" width="220" height="38"/>
    <text x="110" y="14" text-anchor="middle" class="label">InlineTag</text>
    <text x="110" y="32" text-anchor="middle" class="val">@link findUserById</text>
  </g>

  <!-- InlineTag -> Link -> NamePath -->
  <line x1="750" y1="853" x2="750" y2="878" class="edge" marker-end="url(#arr)"/>
  <text x="760" y="870" class="edge-label">body: Link</text>
  <g class="name" transform="translate(680, 882)">
    <rect x="0" y="0" width="145" height="30"/>
    <text x="73" y="12" text-anchor="middle" class="label">NamePath</text>
    <text x="73" y="25" text-anchor="middle" class="val">"findUserById"</text>
  </g>

  <!-- parts[2]: Text -->
  <line x1="870" y1="778" x2="960" y2="810" class="edge" marker-end="url(#arr)"/>
  <text x="935" y="798" class="edge-label">parts[2]</text>
  <g class="leaf" transform="translate(910, 815)">
    <rect x="0" y="0" width="130" height="38"/>
    <text x="65" y="14" text-anchor="middle" class="label">Text</text>
    <text x="65" y="32" text-anchor="middle" class="val">" instead."</text>
  </g>
</svg>
