packages:
  - 'napi/*'
  - 'packages/*'
  - 'tasks/*'
  - 'wasm/*'
  - apps/*

allowBuilds:
  unrs-resolver: true
  wasm-pack: true

catalog:
  '@types/node': ^25.9.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

minimumReleaseAgeExclude:
  - '@kazupon/vp-config'
  - 'wasm-pack'
