[files]
extend-exclude = [
  "refers/",
  "design/005-jsdoccomment-compat/README.md",
  "design/syntax.ebnf",
  "fixtures/**"
]

[default.extend-words]
# `nd` is a deliberate local-variable shorthand for `node_data` in
# ox_jsdoc_binary tests; the global function `node_data(...)` already
# uses the long form.
nd = "nd"
# `pn` is a deliberate local-variable shorthand for the param-name node
# index in ox_jsdoc_binary visitor tests.
pn = "pn"
