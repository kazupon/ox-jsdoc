[workspace]
resolver = "3"
members = [
  "crates/*",
  # Add "napi/*" and "tasks/*" once those Cargo crates exist.
  # Cargo treats unmatched workspace member globs as manifest errors.
]
exclude = [
  "refers/*",
]

[workspace.package]
edition = "2024"
rust-version = "1.91"
license = "MIT"

[workspace.dependencies]
oxc_allocator = "=0.115.0"
oxc_diagnostics = "=0.115.0"
oxc_span = "=0.115.0"
